<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CT シミュレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1a;--card:#111827;--bd:#1e293b;--ac:#3b82f6;--ac2:#60a5fa;--ac3:#93c5fd;--tx:#e2e8f0;--dm:#94a3b8;--dmr:#64748b;--wn:#fbbf24;--ng:#f87171;--ok:#4ade80;--mg:#c084fc}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);-webkit-text-size-adjust:100%}
.mono{font-family:'Courier New',monospace}
.wrap{display:flex;height:100vh}
.left{width:380px;min-width:340px;height:100vh;overflow-y:auto;padding:12px 10px;border-right:1px solid var(--bd);background:var(--card);flex-shrink:0;-webkit-overflow-scrolling:touch}
.right{flex:1;height:100vh;display:flex;flex-direction:column;padding:6px;overflow:hidden}
.tabbar{display:none;background:var(--card);border-bottom:1px solid var(--bd);padding:5px}
.tabbar button{padding:6px 12px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--dm);font-size:.78rem;font-weight:600;cursor:pointer;margin-right:3px}
.tabbar button.act{background:var(--ac);color:#fff;border-color:var(--ac)}
@media(max-width:960px){
  html,body{overflow:hidden;position:fixed;width:100%;height:100%}
  .wrap{flex-direction:column;height:100%;position:relative;overflow:hidden}
  .tabbar{display:flex;flex-shrink:0;position:relative;z-index:5;flex-wrap:wrap;gap:2px}
  .left{width:100%;position:absolute;top:44px;bottom:0;left:0;height:auto;min-height:0;border-right:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
  .right{width:100%;position:absolute;top:44px;bottom:0;left:0;height:auto;min-height:0;display:block !important;overflow-y:auto !important;-webkit-overflow-scrolling:touch;padding:6px;padding-bottom:60px}
  .diagRow{display:flex;gap:4px;height:260px;overflow:visible}
  .mainDiag{flex:1;min-width:0}
  .sideDiag,.fovDiag{width:120px;flex-shrink:0}
  .results{display:flex;flex-wrap:wrap;gap:2px 10px;padding:3px 0}
  .bottomRow{display:block;min-height:auto;max-height:none;overflow:visible;border-top:1px solid var(--bd);padding-top:4px;margin-top:4px}
  .graphPanel{display:block;min-height:auto;overflow:visible;margin-bottom:8px}
  .grCtrl{display:flex;gap:4px;align-items:center;padding:2px 0}
  #GR{height:200px !important}
  .detPanel{display:block;min-height:auto;overflow:visible}
  .left.hide,.right.hide{display:none !important}
}
h1{font-size:1.02rem;font-weight:700;text-align:center;margin-bottom:1px}
.su{text-align:center;color:var(--dmr);font-size:.7rem;margin-bottom:5px}
.sec{border-top:1px solid var(--bd);padding-top:6px;margin-top:6px}
.st{font-size:.84rem;color:var(--ac2);font-weight:700;margin-bottom:3px}
.R{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.R label{font-size:.8rem;color:var(--dm);min-width:110px;flex-shrink:0}
.ni{width:76px;padding:3px 5px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.86rem;font-family:'Courier New',monospace;text-align:right}
.ni:focus{outline:none;border-color:var(--ac)}
.nis{width:60px;padding:2px 4px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.82rem;font-family:'Courier New',monospace;text-align:right}
.nis:focus{outline:none;border-color:var(--mg)}
.nit{width:58px;padding:2px 4px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.78rem}
.nit:focus{outline:none;border-color:var(--wn)}
.sel{padding:2px 3px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.78rem}
.U{font-size:.7rem;color:var(--dmr);white-space:nowrap}
.ht{font-size:.68rem;color:var(--dmr);margin-left:2px}
.sw{margin:1px 0 4px}
.sw input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(90deg,#1e3a8a,#3b82f6);cursor:pointer;touch-action:none}
.sw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;border:2px solid var(--bg);background:var(--ac2)}
.wb{background:rgba(180,83,9,.15);border:1px solid rgba(180,83,9,.3);border-radius:4px;padding:3px 7px;margin:2px 0;font-size:.78rem;color:var(--wn);font-weight:600}
.btnrow{display:flex;gap:6px;margin:6px 0 3px}
.btn{padding:5px 8px;border-radius:5px;font-size:.74rem;font-weight:600;border:1px solid var(--bd);background:rgba(30,41,59,.6);color:var(--dm);cursor:pointer;flex:1;text-align:center}
.btn:hover{background:rgba(59,130,246,.15);color:var(--ac2);border-color:var(--ac)}
.btn.ld{color:var(--ok);border-color:rgba(74,222,128,.3)}
.slist{font-size:.7rem;color:var(--dmr);margin-top:2px;max-height:70px;overflow-y:auto}
.slist div{padding:2px 4px;cursor:pointer;border-radius:3px;display:flex;justify-content:space-between;align-items:center}
.slist div:hover{background:rgba(59,130,246,.1)}
.slist .del{cursor:pointer;padding:1px 4px}.slist .ow{color:var(--wn)}.slist .rm{color:var(--ng)}
.mtfbox{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:5px;padding:5px 7px;margin-top:2px}
.mtfrow{display:flex;align-items:center;gap:3px;margin-bottom:1px;font-size:.8rem}
.mtfrow .ml{color:var(--dm);min-width:82px}
.mtfrow .mv{color:var(--mg);font-weight:700;font-family:'Courier New',monospace}
.mtfrow .mu{color:var(--dmr);font-size:.68rem}
.calcbox{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:5px;padding:5px 7px;margin-top:2px}
.calcR{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.calcR label{font-size:.8rem;color:var(--dm);min-width:70px}
.calcR .cv{color:var(--ac3);font-weight:600;font-family:'Courier New',monospace;font-size:.8rem}
.cbtn{padding:4px 10px;border-radius:5px;font-size:.78rem;font-weight:700;border:1px solid var(--mg);background:rgba(192,132,252,.12);color:var(--mg);cursor:pointer}
.cbtn:hover{background:rgba(192,132,252,.25)}
.cbtn2{padding:4px 10px;border-radius:5px;font-size:.78rem;font-weight:700;border:1px solid var(--ok);background:rgba(74,222,128,.1);color:var(--ok);cursor:pointer}
.cbtn2:hover{background:rgba(74,222,128,.2)}
.designbox{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:5px;padding:5px 7px;margin-top:2px}
.drow{display:flex;align-items:center;gap:3px;margin-bottom:2px;font-size:.8rem}
.drow label{color:var(--dm);min-width:95px}
.drow .dv{color:var(--ok);font-weight:600;font-family:'Courier New',monospace;font-size:.84rem}
.detEditBox{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:5px;padding:4px 6px;margin-top:2px}
.detRow{display:flex;align-items:center;gap:2px;margin-bottom:2px;white-space:nowrap;flex-wrap:nowrap}
.detRow .dlbl{font-size:.76rem;color:var(--wn);font-weight:600;width:12px;flex-shrink:0}
.detRow input.nit{width:54px;flex-shrink:0}
.detRow input.nis{width:46px;flex-shrink:0}
.detRow select.sel{width:36px;flex-shrink:0}
/* Right */
.diagRow{display:flex;gap:4px;flex:1;min-height:0;overflow:hidden}
.mainDiag{flex:1;min-width:0}
.sideDiag,.fovDiag{width:165px;flex-shrink:0}
.bottomRow{display:flex;gap:5px;flex-shrink:0;border-top:1px solid var(--bd);padding-top:4px;margin-top:3px;min-height:170px;max-height:240px;overflow:hidden}
.graphPanel{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column}
.grCtrl{display:flex;gap:4px;align-items:center;padding:2px 0;flex-shrink:0}
.grCtrl label{font-size:.8rem;color:var(--dm)}
.grCtrl input{width:52px;padding:2px 4px;border-radius:3px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.82rem;font-family:'Courier New',monospace;text-align:right}
.detPanel{flex:1;min-width:0;overflow-y:auto}
.results{display:flex;flex-wrap:wrap;gap:2px 10px;padding:3px 0;border-top:1px solid var(--bd);font-size:.82rem;flex-shrink:0}
.rv{display:flex;gap:2px;align-items:baseline}
.rv .rl{color:var(--dm)}.rv .rval{color:var(--ac3);font-weight:600;font-family:'Courier New',monospace}
.rv .ru{color:var(--dmr);font-size:.68rem}
.rv.big .rval{color:var(--ac2);font-size:1.05rem;font-weight:700}
.rv.ng .rval{color:var(--ng)}.rv.wn .rval{color:var(--wn)}.rv.mtf .rval{color:var(--mg)}
.left::-webkit-scrollbar{width:4px}.left::-webkit-scrollbar-track{background:transparent}.left::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.dtbl{width:100%;border-collapse:collapse;font-size:.76rem}
.dtbl th{text-align:right;color:var(--wn);padding:1px 3px;font-weight:600;border-bottom:1px solid rgba(251,191,36,.2);white-space:nowrap}
.dtbl th:first-child{text-align:left}
.dtbl td{text-align:right;padding:1px 3px;font-family:'Courier New',monospace;border-bottom:1px solid rgba(30,41,59,.4);white-space:nowrap}
.dtbl td:first-child{text-align:left;font-family:inherit;color:var(--wn);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
<div class="tabbar" id="TB">
  <button class="act" onclick="showTab('params')">パラメータ</button>
  <button onclick="showTab('diagram')">レイアウト図</button>
</div>
<div class="left" id="PNL">
  <h1>CT シミュレーター</h1>
  <div class="su">汎用シングル系統</div>
  <div class="st">FDD / FOD</div>
  <div class="R"><label>FDD:</label><input type="number" class="ni" id="FDD" step="1" value="500"><span class="U">mm</span></div>
  <div class="sw"><input type="range" id="SL" min="30" max="1500" step="1" value="500"></div>
  <div class="R"><label>FOD:</label><input type="number" class="ni" id="FOD" step="0.1" value="28"><span class="U">mm</span><span class="ht" id="HT"></span></div>
  <div class="sw"><input type="range" id="SLF" min="1" max="200" step="0.5" value="28"></div>
  <div id="WN"></div>
  <div class="sec"><div class="st">線源パラメータ</div></div>
  <div class="R"><label>焦点–出射口距離:</label><input type="number" class="ni" id="FE" step="0.1" value="5"><span class="U">mm</span></div>
  <div class="R"><label>コリメータ厚:</label><input type="number" class="ni" id="CL" step="0.1" value="10"><span class="U">mm</span></div>
  <div class="R"><label>ギャップ:</label><input type="number" class="ni" id="GP" step="0.1" value="5"><span class="U">mm</span></div>
  <div class="R"><label>焦点径:</label><input type="number" class="ni" id="FS" step="0.1" value="5"><span class="U">μm</span></div>
  <div class="R"><label>X線源ファン角:</label><input type="number" class="ni" id="FAN" step="0.1" value="0"><span class="U">°</span><span class="ht">(全角)</span></div>
  <div class="R"><label>受光ファン角:</label><span class="mono" style="color:var(--ac3);font-size:.86rem" id="RF"></span><span class="ht">(自動)</span></div>
  <div id="FA"></div>
  <div class="sec"><div class="st">検出器</div></div>
  <div class="R"><label>画素ピッチ:</label><input type="number" class="ni" id="PP" step="0.1" value="139"><span class="U">μm</span></div>
  <div class="R"><label>横 (pix):</label><input type="number" class="ni" id="PH" step="1" value="3072"><span class="U">pix</span></div>
  <div class="R"><label>縦 (pix):</label><input type="number" class="ni" id="PV" step="1" value="3060"><span class="U">pix</span></div>
  <div class="R"><label>ビニング:</label><select class="sel" id="BN"><option value="1">1×1</option><option value="2">2×2</option><option value="4">4×4</option></select></div>
  <div class="sec"><div class="st">ゴニオ（斜めCT）</div></div>
  <div class="R"><label>傾斜角:</label><input type="number" class="ni" id="GT" step="1" value="0"><span class="U">°</span></div>
  <div class="sec"><div class="st">サンプル</div></div>
  <div class="R"><label>直径 (φ):</label><input type="number" class="ni" id="SW" step="0.1" value="16"><span class="U">mm</span></div>
  <div class="R"><label>高さ (H):</label><input type="number" class="ni" id="SH" step="0.1" value="16"><span class="U">mm</span></div>
  <div class="sec"><div class="st">MTF理論限界 / 焦点ボケ</div></div>
  <div class="mtfbox">
    <div id="MTF"></div>
    <div style="border-top:1px solid rgba(99,102,241,.15);margin:4px 0;padding-top:4px">
      <div class="calcR"><label style="min-width:85px">実効ボクセル:</label><input type="number" class="nis" id="MVOX" step="0.1" value="" placeholder="μm"><span class="U">μm</span>
        <button class="cbtn" style="padding:2px 7px;font-size:.74rem" id="BMTF">計算</button></div>
      <div class="calcR"><label style="min-width:85px">結果:</label><span class="cv" id="MOUT" style="font-size:.78rem">--</span></div>
    </div>
  </div>
  <div class="sec"><div class="st">最大径 ⇔ ボクセル</div></div>
  <div class="calcbox">
    <div class="calcR"><label>最大径:</label><input type="number" class="nis" id="CDIA" step="0.1" value="" placeholder="mm"><span class="U">mm</span></div>
    <div class="calcR"><label>ボクセル:</label><input type="number" class="nis" id="CRES" step="0.1" value="" placeholder="μm"><span class="U">μm</span></div>
    <div class="calcR" style="flex-wrap:wrap"><label>結果:</label><span class="cv" id="COUT">--</span></div>
    <button class="cbtn" id="BCALC">計算</button>
  </div>
  <div class="sec"><div class="st">自動最適設計</div></div>
  <div class="designbox">
    <div class="drow"><label>希望ボクセル:</label><input type="number" class="nis" id="DRES" step="0.1" value="" placeholder="μm"><span class="U">μm</span></div>
    <div class="drow"><label>最大サンプル径:</label><input type="number" class="nis" id="DDIA" step="0.1" value="" placeholder="mm"><span class="U">mm</span></div>
    <button class="cbtn2" id="BDESIGN">最適設計</button>
    <div id="DOUT" style="margin-top:3px;font-size:.8rem"></div>
  </div>
  <div class="sec"><div class="st">検出器比較 設定 (5台)</div></div>
  <div class="detEditBox" id="DETEDIT"></div>
  <div class="sec"><div class="st">設定の保存</div></div>
  <div class="btnrow">
    <button class="btn" id="BSAVE">💾 保存</button>
    <button class="btn ld" id="BLOAD">📂 読込</button>
  </div>
  <div class="slist" id="SV"></div>
  <div style="height:50px"></div>
</div>
<div class="right" id="DIA">
  <div class="diagRow">
    <div class="mainDiag" id="DG"></div>
    <div class="sideDiag" id="SD"></div>
    <div class="fovDiag" id="FV"></div>
  </div>
  <div class="results" id="RS"></div>
  <div class="bottomRow">
    <div class="graphPanel">
      <div class="grCtrl">
        <label>倍率:</label><input type="number" id="GMIN" value="1" step="1">
        <label>〜</label><input type="number" id="GMAX" value="50" step="1">
        <label>Y上限:</label><input type="number" id="GYMAX" value="200" step="10"><label>μm</label>
      </div>
      <div id="GR" style="flex:1;min-height:0"></div>
    </div>
    <div class="detPanel" id="DETCMP"></div>
  </div>
</div>
</div>
<script>
(function(){
"use strict";
var IDS=["FDD","FOD","FE","CL","GP","FS","FAN","PP","PH","PV","GT","SW","SH"];
var $=function(id){return document.getElementById(id)};
function gv(id){var v=parseFloat($(id).value);return isNaN(v)?0:v}
function gi(id){var v=parseInt($(id).value);return isNaN(v)?1:v}
function fm(v,d){d=d==null?2:d;return Math.abs(v)<0.001?"0":v.toFixed(d)}
function ns(t,a){var e=document.createElementNS("http://www.w3.org/2000/svg",t);if(a)for(var k in a)e.setAttribute(k,String(a[k]));return e}
function tx(x,y,s,a){var t=ns("text",Object.assign({x:x,y:y},a||{}));t.textContent=s;return t}

function rdP(){
  var bn=gi("BN")||1;
  var ppRaw=gv("PP"),pxH=gv("PH"),pxV=gv("PV");
  return{fdd:gv("FDD"),fod:gv("FOD"),fe:gv("FE"),cl:gv("CL"),gp:gv("GP"),fs:gv("FS"),fan:gv("FAN"),
    ppRaw:ppRaw,pp:ppRaw*bn,pH:Math.floor(pxH/bn),pV:Math.floor(pxV/bn),
    pxH:pxH,pxV:pxV,bn:bn,gt:gv("GT"),sw:gv("SW"),sh:gv("SH")}
}
function fodMin(p){return p.fe+p.cl+p.gp}

function calc(p){
  var fod=Math.max(p.fod,0.01),fdd=Math.max(p.fdd,1);
  var mag=fdd/fod,res=p.pp/mag;
  var dW=p.pH*p.pp/1000,dH=p.pV*p.pp/1000;
  var fovH=dW/mag,fovV=dH/mag;
  var recvFan=2*Math.atan(dW/2/fdd)*180/Math.PI;
  var srcFan=p.fan;
  var halfRad=(srcFan>0?srcFan:recvFan)/2*Math.PI/180;
  var beamW=2*fdd*Math.tan(halfRad);
  var recvOverSrc=srcFan>0&&recvFan>srcFan;
  var tilt=p.gt||0,rad=tilt*Math.PI/180;
  var projW=p.sw*Math.cos(rad)+p.sh*Math.sin(rad);
  var projH=p.sw*Math.sin(rad)+p.sh*Math.cos(rad);
  var focalBlur=p.fs*(mag-1);
  var detBlur=p.pp/mag;
  var mtfRes=Math.sqrt(focalBlur*focalBlur+detBlur*detBlur);
  var optMag=0,optRes=0,optFOD=0;
  if(p.fs>0){
    var ff=p.fs,pp2=p.pp,M=pp2/ff;if(M<1.01)M=1.5;
    for(var it=0;it<50;it++){
      var fn=ff*ff*(M-1)*M*M*M-pp2*pp2;
      var dfn=ff*ff*(4*M*M*M-3*M*M);
      if(Math.abs(dfn)<1e-20)break;
      var Mn=M-fn/dfn;if(Mn<1.001)Mn=1.001;
      if(Math.abs(Mn-M)<1e-10)break;M=Mn;
    }
    optMag=M;optRes=Math.sqrt(ff*ff*(M-1)*(M-1)+pp2*pp2/M/M);optFOD=fdd/M;
  }
  return{fod:fod,fdd:fdd,mag:mag,res:res,fovH:fovH,fovV:fovV,dW:dW,dH:dH,
    recvFan:recvFan,srcFan:srcFan,halfRad:halfRad,beamW:beamW,
    recvOverSrc:recvOverSrc,tilt:tilt,projW:projW,projH:projH,
    focalBlur:focalBlur,detBlur:detBlur,mtfRes:mtfRes,
    optMag:optMag,optRes:optRes,optFOD:optFOD}
}

function doWarn(p){
  var mn=fodMin(p),c=calc(p),hw=c.projW/2,msgs=[];
  if(p.fod<mn)msgs.push("⚠ FOD < 下限("+fm(mn)+"mm)");
  else if(p.fod<mn+hw)msgs.push("⚠ サンプル端がコリメータ域に接触");
  if(p.fdd>0&&p.fod>=p.fdd)msgs.push("⚠ FOD ≧ FDD");
  $("WN").innerHTML=msgs.length?'<div class="wb">'+msgs.join("<br>")+'</div>':"";
  $("HT").textContent="(下限:"+fm(mn)+"mm)";
}

function mkMTF(c,p){
  var h='';
  h+='<div class="mtfrow"><span class="ml">焦点ボケ:</span><span class="mv">'+fm(c.focalBlur,2)+'</span><span class="mu">μm ['+fm(p.fs,1)+'×('+fm(c.mag,1)+'−1)]</span></div>';
  h+='<div class="mtfrow"><span class="ml">検出器ボケ:</span><span class="mv">'+fm(c.detBlur,2)+'</span><span class="mu">μm ['+fm(p.pp,0)+'/'+fm(c.mag,1)+']</span></div>';
  h+='<div class="mtfrow"><span class="ml">MTF限界:</span><span class="mv" style="font-size:.92rem">'+fm(c.mtfRes,2)+'</span><span class="mu">μm</span></div>';
  if(c.optMag>0){
    h+='<div style="border-top:1px solid rgba(99,102,241,.12);margin:2px 0;padding-top:2px"></div>';
    h+='<div class="mtfrow"><span class="ml">最適倍率:</span><span class="mv">×'+fm(c.optMag,1)+'</span><span class="mu">(FOD '+fm(c.optFOD,1)+'mm / MTF '+fm(c.optRes,2)+'μm)</span></div>';
  }
  if(p.bn>1){h+='<div class="mtfrow"><span class="ml">ビニング:</span><span class="mv">'+p.bn+'×'+p.bn+'</span><span class="mu">(実効pp='+fm(p.pp,0)+'μm / '+p.pH+'×'+p.pV+'px)</span></div>';}
  $("MTF").innerHTML=h;
}

/* ========== DETECTORS ========== */
var defDets=[
  {name:"Thales",model:"1623",pp:89,pH:2560,pV:1792,bn:1},
  {name:"Rayence",model:"0505",pp:49,pH:1172,pV:1100,bn:1},
  {name:"iRay",model:"0506X",pp:25,pH:5720,pV:4650,bn:1},
  {name:"iRay",model:"1717M",pp:139,pH:3072,pV:3060,bn:1},
  {name:"Varex",model:"4343C",pp:150,pH:2880,pV:2880,bn:1}
];
function buildDetEdit(){
  var h='<div style="display:flex;gap:1px;margin-bottom:3px;font-size:.68rem;color:var(--dmr)">'
    +'<span style="width:12px"></span><span style="width:54px">メーカー</span><span style="width:50px">型式</span>'
    +'<span style="width:46px;text-align:right">pp</span><span style="width:18px"></span>'
    +'<span style="width:46px;text-align:right">横px</span><span style="width:10px"></span>'
    +'<span style="width:46px;text-align:right">縦px</span><span style="width:36px;text-align:center">Bin</span></div>';
  for(var i=0;i<5;i++){
    var d=defDets[i]||{name:"",model:"",pp:0,pH:0,pV:0,bn:1};
    h+='<div class="detRow">';
    h+='<span class="dlbl">'+(i+1)+'</span>';
    h+='<input class="nit" id="DN'+i+'" value="'+d.name+'" placeholder="名" style="width:54px">';
    h+='<input class="nit" id="DM'+i+'" value="'+d.model+'" placeholder="型式" style="width:50px">';
    h+='<input class="nis" id="DP'+i+'" type="number" value="'+d.pp+'" style="width:46px">';
    h+='<span class="U">μm</span>';
    h+='<input class="nis" id="DX'+i+'" type="number" value="'+d.pH+'" style="width:46px">';
    h+='<span class="U">×</span>';
    h+='<input class="nis" id="DY'+i+'" type="number" value="'+d.pV+'" style="width:46px">';
    h+='<select class="sel" id="DB'+i+'" style="width:36px"><option value="1"'+(d.bn===1?' selected':'')+'>1×</option><option value="2"'+(d.bn===2?' selected':'')+'>2×</option><option value="4"'+(d.bn===4?' selected':'')+'>4×</option></select>';
    h+='</div>';
  }
  $("DETEDIT").innerHTML=h;
  for(var i=0;i<5;i++){
    ["DN","DM","DP","DX","DY","DB"].forEach(function(pre){
      var el=$(pre+i);if(el)el.addEventListener("input",function(){update()});
      if(el&&el.tagName==="SELECT")el.addEventListener("change",function(){update()});
    });
  }
}
function getDetectors(){
  var arr=[];
  for(var i=0;i<5;i++){
    var n=($("DN"+i)||{}).value||"";
    var m=($("DM"+i)||{}).value||"";
    var ppRaw=parseFloat(($("DP"+i)||{}).value)||0;
    var px=parseInt(($("DX"+i)||{}).value)||0;
    var py=parseInt(($("DY"+i)||{}).value)||0;
    var bn=parseInt(($("DB"+i)||{}).value)||1;
    if(ppRaw>0&&px>0){
      var pp=ppRaw*bn,epx=Math.floor(px/bn),epy=Math.floor(py/bn);
      arr.push({name:n,model:m,ppRaw:ppRaw,pp:pp,pH:epx,pV:epy,bn:bn});
    }
  }
  return arr;
}

/* ========== GRAPH ========== */
function drawGraph(p,el){
  var W=el.offsetWidth||el.clientWidth||300;
  var H=el.offsetHeight||el.clientHeight||160;
  if(W<50)W=300;if(H<50)H=160;
  var fs=p.fs,pp=p.pp,fdd=Math.max(p.fdd,1);
  var Mmin=Math.max(gv("GMIN"),1.01);
  var Mmax=Math.max(gv("GMAX"),Mmin+1);
  var yMax=Math.max(gv("GYMAX"),1);
  var ml=46,mr=8,mt=16,mb=30;
  var gW=W-ml-mr,gH=H-mt-mb;

  var svg=ns("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H});
  svg.appendChild(ns("rect",{x:0,y:0,width:W,height:H,fill:"#060b16",rx:3}));
  function mx(M){return ml+(M-Mmin)/(Mmax-Mmin)*gW}
  function my(v){return mt+gH-Math.min(v,yMax)/yMax*gH}

  // Grid
  for(var j=0;j<=4;j++){
    var yv=yMax*j/4,yy=my(yv);
    svg.appendChild(ns("line",{x1:ml,y1:yy,x2:ml+gW,y2:yy,stroke:"#1e293b","stroke-width":0.5}));
    svg.appendChild(tx(ml-2,yy+4,yv>=100?fm(yv,0):fm(yv,1),{"text-anchor":"end",fill:"#64748b","font-size":"10"}));
  }
  for(var j=0;j<=5;j++){
    var xv=Mmin+j*(Mmax-Mmin)/5,xx=mx(xv);
    svg.appendChild(ns("line",{x1:xx,y1:mt,x2:xx,y2:mt+gH,stroke:"#1e293b","stroke-width":0.5}));
    svg.appendChild(tx(xx,mt+gH+12,fm(xv,xv<10?1:0)+"×",{"text-anchor":"middle",fill:"#64748b","font-size":"10"}));
  }
  svg.appendChild(ns("line",{x1:ml,y1:mt,x2:ml,y2:mt+gH,stroke:"#475569","stroke-width":1}));
  svg.appendChild(ns("line",{x1:ml,y1:mt+gH,x2:ml+gW,y2:mt+gH,stroke:"#475569","stroke-width":1}));
  svg.appendChild(tx(W/2,H-1,"倍率",{"text-anchor":"middle",fill:"#64748b","font-size":"10"}));
  svg.appendChild(tx(4,mt+6,"μm",{fill:"#64748b","font-size":"10"}));

  // Plot
  var steps=Math.min(Math.floor(gW),120);
  function plotLine(color,fn){
    var d="";
    for(var i=0;i<=steps;i++){
      var M=Mmin+i*(Mmax-Mmin)/steps;
      var v=fn(M),x=mx(M),y=my(v);
      d+=(i===0?"M":"L")+x.toFixed(1)+","+y.toFixed(1);
    }
    svg.appendChild(ns("path",{d:d,stroke:color,"stroke-width":1.5,fill:"none"}));
  }
  plotLine("#60a5fa",function(M){return pp/M});          // 検出器ボケ
  plotLine("#f87171",function(M){return fs*(M-1)});       // 焦点ボケ
  plotLine("#c084fc",function(M){                         // MTF限界
    var db=pp/M,fb=fs*(M-1);return Math.sqrt(db*db+fb*fb);
  });

  // Current marker
  var curM=fdd/Math.max(p.fod,0.01);
  if(curM>=Mmin&&curM<=Mmax){
    svg.appendChild(ns("line",{x1:mx(curM),y1:mt,x2:mx(curM),y2:mt+gH,stroke:"#fbbf24","stroke-width":1.2,"stroke-dasharray":"3,2"}));
  }
  var c=calc(p);
  if(c.optMag>0&&c.optMag>=Mmin&&c.optMag<=Mmax){
    svg.appendChild(ns("line",{x1:mx(c.optMag),y1:mt,x2:mx(c.optMag),y2:mt+gH,stroke:"#4ade80","stroke-width":1,"stroke-dasharray":"2,2"}));
  }

  // Legend
  var lx=ml+gW-135,ly=mt+2;
  svg.appendChild(ns("rect",{x:lx-3,y:ly-3,width:138,height:38,fill:"rgba(6,11,22,.85)",rx:2}));
  [[0,"#60a5fa","pp/M 検出器ボケ"],[13,"#f87171","f(M-1) 焦点ボケ"],[26,"#c084fc","MTF限界"]].forEach(function(r){
    svg.appendChild(ns("line",{x1:lx,y1:ly+r[0]+5,x2:lx+14,y2:ly+r[0]+5,stroke:r[1],"stroke-width":2}));
    svg.appendChild(tx(lx+17,ly+r[0]+9,r[2],{fill:r[1],"font-size":"9"}));
  });
  // Marker labels
  if(curM>=Mmin&&curM<=Mmax)svg.appendChild(tx(mx(curM),mt-2,"現在 ×"+fm(curM,1),{"text-anchor":"middle",fill:"#fbbf24","font-size":"10","font-weight":"bold"}));
  if(c.optMag>0&&c.optMag>=Mmin&&c.optMag<=Mmax){
    var ox=mx(c.optMag);
    svg.appendChild(tx(ox,mt+gH+22,"最適 ×"+fm(c.optMag,1)+" ("+fm(c.optRes,1)+"μm)",{"text-anchor":"middle",fill:"#4ade80","font-size":"9","font-weight":"bold"}));
  }

  return svg;
}

/* ========== DETECTOR COMPARE TABLE ========== */
function mkDetCompare(p){
  var dets=getDetectors();
  var fdd=Math.max(p.fdd,1),fs=p.fs,dia=p.sw;
  if(!dets.length){$("DETCMP").innerHTML='';return}
  var h='<table class="dtbl"><tr><th style="text-align:left">検出器</th><th>pp(実効)</th><th>Bin</th><th>倍率</th><th>FOD</th><th>ボクセル</th><th>MTF</th></tr>';
  dets.forEach(function(det){
    var dW=det.pH*det.pp/1000;
    var M=dia>0?dW/dia:fdd/Math.max(p.fod,0.01);
    if(M<1.001)M=1.001;
    var fod=fdd/M,vox=det.pp/M;
    var fb=fs*(M-1),db=det.pp/M,mtf=Math.sqrt(fb*fb+db*db);
    var label=det.name+(det.model?" "+det.model:"");
    h+='<tr><td>'+label+'</td>';
    h+='<td style="color:#94a3b8">'+det.ppRaw+(det.bn>1?"→"+fm(det.pp,0):"")+'</td>';
    h+='<td style="color:#94a3b8">'+det.bn+'×'+det.bn+'</td>';
    h+='<td style="color:#93c5fd">×'+fm(M,1)+'</td>';
    h+='<td style="color:#86efac">'+fm(fod,1)+'</td>';
    h+='<td style="color:#60a5fa;font-weight:700">'+fm(vox,1)+'</td>';
    h+='<td style="color:#c084fc;font-weight:700">'+fm(mtf,1)+'</td></tr>';
  });
  h+='</table>';
  h+='<div style="font-size:.66rem;color:#475569;margin-top:1px">φ'+fm(dia,1)+'mm基準 FDD'+fm(fdd,0)+' f'+fm(fs,1)+'μm</div>';
  $("DETCMP").innerHTML=h;
}

/* ========== TOP VIEW ========== */
function drawTop(p,c){
  var el=$("DG"),W=el.offsetWidth||el.clientWidth||400,H=el.offsetHeight||el.clientHeight||220;
  if(W<50)W=400;if(H<50)H=220;
  var ml=48,mr=10,mt=28,mb=28,pW=W-ml-mr,pH2=H-mt-mb,maxH=pH2*0.42;
  var fddMax=1500,sc=pW/(fddMax*1.05);
  var sx=ml,dx=sx+p.fdd*sc,rx=sx+c.fod*sc,cy=H/2;
  var recvHR=c.recvFan/2*Math.PI/180;
  var srcHR=c.srcFan>0?(c.srcFan/2*Math.PI/180):0;
  function tae(hr,tl){if(hr>=Math.PI/2*.98)return{ex:sx+3,h:maxH};var h2=tl*Math.tan(hr);if(h2<=maxH)return{ex:sx+tl,h:h2};return{ex:sx+maxH/Math.tan(hr),h:maxH}}
  var svg=ns("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H});
  var df=ns("defs");
  var ga=ns("linearGradient",{id:"gA",x1:"0%",y1:"0%",x2:"100%",y2:"0%"});
  ga.appendChild(ns("stop",{offset:"0%","stop-color":"#3b82f6","stop-opacity":"0.5"}));
  ga.appendChild(ns("stop",{offset:"100%","stop-color":"#3b82f6","stop-opacity":"0.05"}));
  df.appendChild(ga);
  var cp=ns("clipPath",{id:"srcClip"});cp.appendChild(ns("rect",{x:ml-5,y:mt-5,width:pW+10,height:pH2+10}));
  df.appendChild(cp);svg.appendChild(df);
  svg.appendChild(ns("rect",{x:ml-5,y:mt-5,width:pW+10,height:pH2+10,fill:"#060b16",rx:4}));
  if(c.srcFan>0){var se=tae(srcHR,pW);var g=ns("g",{"clip-path":"url(#srcClip)"});
    g.appendChild(ns("polygon",{points:sx+","+cy+" "+se.ex+","+(cy-se.h)+" "+se.ex+","+(cy+se.h),fill:"url(#gA)",opacity:"0.18"}));
    g.appendChild(ns("line",{x1:sx,y1:cy,x2:se.ex,y2:cy-se.h,stroke:"#3b82f6","stroke-width":1,"stroke-dasharray":"6,3",opacity:"0.4"}));
    g.appendChild(ns("line",{x1:sx,y1:cy,x2:se.ex,y2:cy+se.h,stroke:"#3b82f6","stroke-width":1,"stroke-dasharray":"6,3",opacity:"0.4"}));
    svg.appendChild(g)}
  var re=tae(recvHR,dx-sx);var hDet=re.h;
  svg.appendChild(ns("polygon",{points:sx+","+cy+" "+re.ex+","+(cy-hDet)+" "+re.ex+","+(cy+hDet),fill:"url(#gA)",opacity:"0.5"}));
  svg.appendChild(ns("line",{x1:sx,y1:cy,x2:re.ex,y2:cy-hDet,stroke:"#3b82f6","stroke-width":"1.2",opacity:"0.8"}));
  svg.appendChild(ns("line",{x1:sx,y1:cy,x2:re.ex,y2:cy+hDet,stroke:"#3b82f6","stroke-width":"1.2",opacity:"0.8"}));
  svg.appendChild(ns("rect",{x:sx-11,y:cy-11,width:11,height:22,fill:"#2563eb",rx:2}));
  svg.appendChild(tx(sx-5,cy+3,"S",{"text-anchor":"middle",fill:"white","font-size":"10","font-weight":"bold"}));
  var sR=Math.max(Math.min(p.sw/2*sc*0.5,22),3);
  svg.appendChild(ns("circle",{cx:rx,cy:cy,r:sR,fill:"rgba(74,222,128,.1)",stroke:"#4ade80","stroke-width":"1.5","stroke-dasharray":"3,2"}));
  svg.appendChild(ns("circle",{cx:rx,cy:cy,r:2,fill:"#4ade80"}));
  svg.appendChild(tx(rx,cy+sR+10,"φ"+fm(p.sw,1),{"text-anchor":"middle",fill:"#86efac","font-size":"10"}));
  svg.appendChild(ns("line",{x1:dx,y1:cy-hDet,x2:dx,y2:cy+hDet,stroke:"#60a5fa","stroke-width":3}));
  svg.appendChild(tx(dx+3,cy-hDet-4,"検出器",{fill:"#93c5fd","font-size":"10","font-weight":"600"}));
  if(c.recvOverSrc){svg.appendChild(ns("rect",{x:dx-24,y:cy-hDet-14,width:48,height:12,fill:"rgba(180,83,9,.9)",rx:2}));svg.appendChild(tx(dx,cy-hDet-5,"NG",{"text-anchor":"middle",fill:"#fbbf24","font-size":"10","font-weight":"bold"}))}
  var ix=Math.min(dx+4,W-175),iy=cy+hDet*0.05;
  var bH=c.recvOverSrc?72:60;
  svg.appendChild(ns("rect",{x:ix,y:iy,width:170,height:bH,fill:"rgba(30,58,95,.65)",rx:3,stroke:"#3b82f6","stroke-width":"0.5"}));
  svg.appendChild(tx(ix+4,iy+12,"×"+fm(c.mag,1)+" ボクセル"+fm(c.res,1)+"μm",{fill:"#bfdbfe","font-size":"10"}));
  svg.appendChild(tx(ix+4,iy+24,"MTF "+fm(c.mtfRes,1)+"μm",{fill:"#c084fc","font-size":"10","font-weight":"600"}));
  svg.appendChild(tx(ix+4,iy+36,"視野"+fm(c.fovH,1)+"×"+fm(c.fovV,1)+"mm",{fill:"#93c5fd","font-size":"10"}));
  svg.appendChild(tx(ix+4,iy+48,"受光"+fm(c.recvFan,1)+"°",{fill:"#93c5fd","font-size":"10"}));
  if(c.recvOverSrc)svg.appendChild(tx(ix+4,iy+60,"⚠受光>線源",{fill:"#f87171","font-size":"10","font-weight":"bold"}));
  svg.appendChild(ns("line",{x1:sx,y1:mt-12,x2:dx,y2:mt-12,stroke:"#60a5fa","stroke-width":"0.7"}));
  svg.appendChild(tx((sx+dx)/2,mt-15,"FDD "+fm(p.fdd,0)+"mm",{"text-anchor":"middle",fill:"#93c5fd","font-size":"10"}));
  svg.appendChild(ns("line",{x1:sx,y1:H-mb+10,x2:rx,y2:H-mb+10,stroke:"#4ade80","stroke-width":"0.7"}));
  svg.appendChild(tx((sx+rx)/2,H-mb+8,"FOD "+fm(p.fod)+"mm",{"text-anchor":"middle",fill:"#86efac","font-size":"10"}));
  return svg;
}

function drawSide(p,c){
  var el=$("SD"),W=el.offsetWidth||155,H=el.offsetHeight||el.clientHeight||220;
  if(H<50)H=220;
  var svg=ns("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H});
  svg.appendChild(ns("rect",{x:0,y:0,width:W,height:H,fill:"#060b16",rx:3}));
  svg.appendChild(tx(W/2,12,"側面図",{"text-anchor":"middle",fill:"#94a3b8","font-size":"11","font-weight":"bold"}));
  var mt=20,mb=30,cx=W/2,areaH=H-mt-mb,beamY=mt+areaH*0.5;
  svg.appendChild(ns("line",{x1:4,y1:beamY,x2:W-4,y2:beamY,stroke:"#3b82f6","stroke-width":1,"stroke-dasharray":"4,2",opacity:"0.4"}));
  var tilt=c.tilt,mxW=tilt>0?c.projW:p.sw,mxH=tilt>0?c.projH:p.sh;
  var scS=Math.min((W-24)/Math.max(mxW,0.1),(areaH-30)/Math.max(mxH,0.1));
  var sw2=p.sw*scS,sh2=p.sh*scS;
  if(tilt>0){
    var g=ns("g",{transform:"rotate("+(-tilt)+","+cx+","+beamY+")"});
    g.appendChild(ns("rect",{x:cx-sw2/2,y:beamY-sh2/2,width:sw2,height:sh2,fill:"rgba(74,222,128,.08)",stroke:"#4ade80","stroke-width":"1.2",rx:2}));
    svg.appendChild(g);
    svg.appendChild(tx(cx,beamY-c.projH*scS/2-6,"傾斜"+fm(tilt,0)+"°",{"text-anchor":"middle",fill:"#fbbf24","font-size":"11","font-weight":"700"}));
  }else{
    svg.appendChild(ns("rect",{x:cx-sw2/2,y:beamY-sh2/2,width:sw2,height:sh2,fill:"rgba(74,222,128,.08)",stroke:"#4ade80","stroke-width":"1.2",rx:2}));
    svg.appendChild(tx(cx,beamY+sh2/2+12,"φ"+fm(p.sw,1)+"×H"+fm(p.sh,1),{"text-anchor":"middle",fill:"#86efac","font-size":"10"}));
  }
  return svg;
}

function drawFront(c,p){
  var el=$("FV"),W=el.offsetWidth||155,H=el.offsetHeight||el.clientHeight||220;
  if(H<50)H=220;
  var svg=ns("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H});
  svg.appendChild(ns("rect",{x:0,y:0,width:W,height:H,fill:"#060b16",rx:3}));
  svg.appendChild(tx(W/2,12,"正面図",{"text-anchor":"middle",fill:"#94a3b8","font-size":"11","font-weight":"bold"}));
  var mt=20,mb=30,areaW=W-18,areaH=H-mt-mb,cx=W/2,cy=mt+areaH/2;
  var sW=c.tilt>0?c.projW:p.sw,sH=c.tilt>0?c.projH:p.sh;
  var mW=Math.max(c.fovH,sW)*1.15,mH=Math.max(c.fovV,sH)*1.15;
  if(mW<.01)mW=1;if(mH<.01)mH=1;
  var sc2=Math.min(areaW/mW,areaH/mH);
  var fw=c.fovH*sc2,fh=c.fovV*sc2;
  svg.appendChild(ns("rect",{x:cx-fw/2,y:cy-fh/2,width:Math.max(fw,1),height:Math.max(fh,1),fill:"rgba(59,130,246,.05)",stroke:"#3b82f6","stroke-width":"1.3","stroke-dasharray":"4,3",rx:2}));
  svg.appendChild(tx(cx,cy-fh/2-4,"FOV "+fm(c.fovH,1)+"×"+fm(c.fovV,1),{"text-anchor":"middle",fill:"#60a5fa","font-size":"9"}));
  var spW=sW*sc2,spH=sH*sc2;
  var ok=c.fovH>=sW&&c.fovV>=sH;
  var clr=ok?"#4ade80":"#f87171",bg2=ok?"rgba(74,222,128,.1)":"rgba(248,113,113,.1)";
  svg.appendChild(ns("rect",{x:cx-spW/2,y:cy-spH/2,width:Math.max(spW,1),height:Math.max(spH,1),fill:bg2,stroke:clr,"stroke-width":"1.2",rx:2}));
  svg.appendChild(tx(cx,cy+3,"φ"+fm(p.sw,1),{"text-anchor":"middle",fill:ok?"#86efac":"#fca5a5","font-size":"10","font-weight":"600"}));
  svg.appendChild(tx(cx,H-mb+12,ok?"✔ OK":"✘ はみ出し",{"text-anchor":"middle",fill:clr,"font-size":"11","font-weight":"bold"}));
  return svg;
}

function mkResults(c,p){
  var h="";
  function rv(l,v,u,cls){h+='<div class="rv'+(cls?" "+cls:"")+'"><span class="rl">'+l+'</span><span class="rval">'+v+'</span><span class="ru">'+u+'</span></div>'}
  rv("倍率","×"+fm(c.mag,1),"","");
  rv("ボクセル",fm(c.res,1),"μm","big");
  rv("MTF",fm(c.mtfRes,1),"μm","mtf");
  rv("視野",fm(c.fovH,1)+"×"+fm(c.fovV,1),"mm","");
  if(p.bn>1)rv("Bin",p.bn+"×"+p.bn,"(pp"+fm(p.pp,0)+"μm)","wn");
  if(c.tilt>0)rv("傾斜",fm(c.tilt,0)+"° 幅"+fm(c.projW,1),"mm","wn");
  if(c.recvOverSrc)h+='<div class="rv ng"><span class="rval">⚠受光>線源</span></div>';
  $("RS").innerHTML=h;
}

/* ========== Calc tools ========== */
$("BCALC").addEventListener("click",function(){
  var diaIn=parseFloat($("CDIA").value),voxIn=parseFloat($("CRES").value);
  var p=rdP(),fdd=Math.max(p.fdd,1),pp=p.pp,dW=p.pH*pp/1000;
  var hD=!isNaN(diaIn)&&diaIn>0,hV=!isNaN(voxIn)&&voxIn>0;
  if(hD&&!hV){var M=dW/diaIn;if(M<1.001)M=1.001;var fod=fdd/M,v=pp/M,fb=p.fs*(M-1),mtf=Math.sqrt(fb*fb+v*v);
    $("CRES").value="";$("COUT").textContent="φ"+fm(diaIn,1)+"→×"+fm(M,1)+" FOD"+fm(fod,1)+" vox"+fm(v,1)+"μm MTF"+fm(mtf,1)+"μm"}
  else if(hV&&!hD){var M2=pp/voxIn;if(M2<1.001)M2=1.001;var f2=fdd/M2,md=dW/M2,fb2=p.fs*(M2-1),mtf2=Math.sqrt(fb2*fb2+voxIn*voxIn);
    $("CDIA").value="";$("COUT").textContent=fm(voxIn,1)+"μm→×"+fm(M2,1)+" FOD"+fm(f2,1)+" 最大φ"+fm(md,1)+"mm MTF"+fm(mtf2,1)+"μm"}
  else if(hD&&hV)$("COUT").textContent="一方だけ入力";
  else $("COUT").textContent="最大径 or ボクセルを入力";
});
$("BMTF").addEventListener("click",function(){
  var vox=parseFloat($("MVOX").value);if(isNaN(vox)||vox<=0){$("MOUT").textContent="ボクセルを入力";return}
  var p=rdP(),pp=p.pp,fs=p.fs,fdd=Math.max(p.fdd,1);
  var M=pp/vox;if(M<1.001)M=1.001;var fod=fdd/M,fb=fs*(M-1),mtf=Math.sqrt(fb*fb+vox*vox),dW=p.pH*pp/1000;
  $("MOUT").textContent=fm(vox,1)+"μm→×"+fm(M,1)+" FOD"+fm(fod,1)+" 焦点ボケ"+fm(fb,1)+"μm MTF"+fm(mtf,1)+"μm 最大φ"+fm(dW/M,1)+"mm";
});
$("BDESIGN").addEventListener("click",function(){
  var tR=parseFloat($("DRES").value),mD=parseFloat($("DDIA").value);
  if(isNaN(tR)||tR<=0||isNaN(mD)||mD<=0){$("DOUT").innerHTML='<span style="color:#f87171">両方入力</span>';return}
  var p=rdP(),pp=p.pp,fdd=Math.max(p.fdd,1),dW=p.pH*pp/1000;
  var Mf=dW/mD,Mv=pp/tR;if(Mf<1.001)Mf=1.001;if(Mv<1.001)Mv=1.001;
  var Mq=Math.max(Mf,Mv),fq=fdd/Mq,vA=pp/Mq,db=pp/Mq;
  var r2=tR*tR-db*db,mF=0;if(r2>0&&(Mq-1)>.001)mF=Math.sqrt(r2)/(Mq-1);
  var fb=p.fs*(Mq-1),mtfA=Math.sqrt(fb*fb+db*db),fovA=dW/Mq;
  var h='<div style="border:1px solid rgba(74,222,128,.25);border-radius:4px;padding:4px;background:rgba(74,222,128,.04);font-size:.8rem">';
  h+='<div class="drow"><label>必要倍率:</label><span class="dv">×'+fm(Mq,2)+'</span></div>';
  h+='<div class="drow"><label>FOD:</label><span class="dv">'+fm(fq,2)+'mm</span></div>';
  h+='<div class="drow"><label>ボクセル:</label><span class="dv">'+fm(vA,2)+'μm</span></div>';
  h+='<div class="drow"><label>FOV:</label><span class="dv">'+fm(fovA,1)+'mm</span>'+(fovA<mD?'<span style="color:#f87171;margin-left:3px">⚠不足</span>':'')+'</div>';
  h+='<div style="border-top:1px solid rgba(74,222,128,.15);margin:2px 0;padding-top:2px"></div>';
  h+='<div class="drow"><label>現焦点径:</label><span class="dv">'+fm(p.fs,1)+'μm</span></div>';
  h+='<div class="drow"><label>現MTF:</label><span class="dv" style="color:'+(mtfA<=tR?'#4ade80':'#f87171')+'">'+fm(mtfA,1)+'μm '+(mtfA<=tR?'✔':'✘')+'</span></div>';
  if(mF>0)h+='<div class="drow"><label>必要焦点径:</label><span class="dv">≤'+fm(mF,1)+'μm</span></div>';
  else h+='<div class="drow"><span style="color:#f87171">検出器ボケ('+fm(db,1)+'μm)が目標超</span></div>';
  h+='</div>';$("DOUT").innerHTML=h;
});

/* ========== SAVE/LOAD ========== */
function getSaves(){try{return JSON.parse(localStorage.getItem("ct_saves")||"[]")}catch(e){return[]}}
function putSaves(a){localStorage.setItem("ct_saves",JSON.stringify(a))}
function renderSaves(){
  var s=getSaves(),el=$("SV");
  if(!s.length){el.innerHTML='<div style="padding:2px;color:#475569">保存なし</div>';return}
  el.innerHTML=s.map(function(v,i){return '<div><span style="flex:1" data-act="load" data-i="'+i+'">'+v.name+'</span><span class="del ow" data-act="ow" data-i="'+i+'">↑</span><span class="del rm" data-act="rm" data-i="'+i+'">✕</span></div>'}).join("")}
$("SV").addEventListener("click",function(e){
  var t=e.target,act=t.getAttribute("data-act"),i=parseInt(t.getAttribute("data-i"));
  if(!act||isNaN(i))return;var saves=getSaves();if(!saves[i])return;
  if(act==="load"){var d=saves[i].data;IDS.forEach(function(id){if(d[id]!=null)$(id).value=d[id]});if(d.BN)$("BN").value=d.BN;update()}
  else if(act==="ow"){if(!confirm("上書き？"))return;var data={};IDS.forEach(function(id){data[id]=gv(id)});data.BN=gi("BN");saves[i].data=data;putSaves(saves);renderSaves()}
  else if(act==="rm"){if(!confirm("削除？"))return;saves.splice(i,1);putSaves(saves);renderSaves()}
});
$("BSAVE").addEventListener("click",function(){
  var saves=getSaves(),name=prompt("設定名:","設定"+(saves.length+1));if(!name)return;
  var data={};IDS.forEach(function(id){data[id]=gv(id)});data.BN=gi("BN");
  for(var i=0;i<saves.length;i++){if(saves[i].name===name){if(!confirm("上書き？"))return;saves[i].data=data;putSaves(saves);renderSaves();return}}
  saves.push({name:name,data:data});putSaves(saves);renderSaves()});
$("BLOAD").addEventListener("click",function(){if(!getSaves().length){alert("保存なし");return}renderSaves()});

/* TABS */
window.showTab=function(tab){
  var btns=$("TB").querySelectorAll("button");
  for(var i=0;i<btns.length;i++)btns[i].className="";
  if(tab==="params")btns[0].className="act";else btns[1].className="act";
  $("PNL").classList.add("hide");$("DIA").classList.add("hide");
  if(tab==="params")$("PNL").classList.remove("hide");
  else{$("DIA").classList.remove("hide");setTimeout(update,50)}};

/* MAIN UPDATE */
function update(){
  var p=rdP();doWarn(p);var c=calc(p);
  $("SL").value=p.fdd;$("SLF").value=p.fod;
  $("RF").textContent=fm(c.recvFan,1)+"°";
  $("FA").innerHTML=c.recvOverSrc?'<div class="wb">⚠受光('+fm(c.recvFan,1)+'°)>線源('+fm(c.srcFan,1)+'°)</div>':"";
  var dg=$("DG");dg.innerHTML="";dg.appendChild(drawTop(p,c));
  var sd=$("SD");sd.innerHTML="";sd.appendChild(drawSide(p,c));
  var fv=$("FV");fv.innerHTML="";fv.appendChild(drawFront(c,p));
  mkResults(c,p);mkMTF(c,p);
  var gr=$("GR");gr.innerHTML="";gr.appendChild(drawGraph(p,gr));
  mkDetCompare(p);
}

/* EVENTS */
$("SL").addEventListener("input",function(){$("FDD").value=this.value;update()});
$("SLF").addEventListener("input",function(){$("FOD").value=this.value;update()});
$("BN").addEventListener("change",function(){update()});
["FE","CL","GP"].forEach(function(id){$(id).addEventListener("input",function(){var p=rdP(),mn=fodMin(p),c=calc(p);if(p.fod<mn+c.projW/2)$("FOD").value=fm(mn+c.projW/2);update()})});
IDS.forEach(function(id){$(id).addEventListener("input",function(){update()})});
["GMIN","GMAX","GYMAX"].forEach(function(id){$(id).addEventListener("input",function(){var gr=$("GR");gr.innerHTML="";gr.appendChild(drawGraph(rdP(),gr))})});
var rto;window.addEventListener("resize",function(){clearTimeout(rto);rto=setTimeout(update,150)});

buildDetEdit();
$("FOD").value=fm(5+10+5+16/2);
renderSaves();update();setTimeout(update,200);
})();
</script>
