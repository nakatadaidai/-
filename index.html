<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CT シミュレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1a;--card:#111827;--bd:#1e293b;--ac:#3b82f6;--ac2:#60a5fa;--ac3:#93c5fd;--tx:#e2e8f0;--dm:#94a3b8;--dmr:#64748b;--wn:#fbbf24;--ng:#f87171;--ok:#4ade80;--mg:#c084fc}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);-webkit-text-size-adjust:100%}
.mono{font-family:'Courier New',monospace}

.wrap{display:flex;height:100vh}
.left{width:340px;min-width:310px;height:100vh;overflow-y:auto;padding:14px 12px;border-right:1px solid var(--bd);background:var(--card);flex-shrink:0;-webkit-overflow-scrolling:touch}
.right{flex:1;height:100vh;display:flex;flex-direction:column;padding:10px;overflow:hidden}

.tabbar{display:none;background:var(--card);border-bottom:1px solid var(--bd);padding:6px}
.tabbar button{padding:8px 16px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--dm);font-size:.88rem;font-weight:600;cursor:pointer;margin-right:6px}
.tabbar button.act{background:var(--ac);color:#fff;border-color:var(--ac)}
@media(max-width:960px){
  html,body{overflow:hidden}
  .wrap{flex-direction:column;height:100vh;overflow:hidden}
  .tabbar{display:flex;flex-shrink:0}
  .left{width:100%;height:0;flex:1 1 0;min-height:0;border-right:none;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding-bottom:60px}
  .right{width:100%;height:0;flex:1 1 0;min-height:0;overflow:hidden}
  .left.hide,.right.hide{display:none !important}
}

h1{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:2px}
.su{text-align:center;color:var(--dmr);font-size:.75rem;margin-bottom:8px}
.sec{border-top:1px solid var(--bd);padding-top:8px;margin-top:8px}
.st{font-size:.88rem;color:var(--ac2);font-weight:700;margin-bottom:5px}
.R{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.R label{font-size:.88rem;color:var(--dm);min-width:120px;flex-shrink:0}
.ni{width:85px;padding:5px 7px;border-radius:5px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.92rem;font-family:'Courier New',monospace;text-align:right}
.ni:focus{outline:none;border-color:var(--ac)}
.nis{width:70px;padding:4px 6px;border-radius:5px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.88rem;font-family:'Courier New',monospace;text-align:right}
.nis:focus{outline:none;border-color:var(--mg)}
.U{font-size:.75rem;color:var(--dmr);min-width:22px}
.ht{font-size:.72rem;color:var(--dmr);margin-left:4px}
.sw{margin:2px 0 6px}
.sw input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:linear-gradient(90deg,#1e3a8a,#3b82f6);cursor:pointer;touch-action:none}
.sw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;border:2px solid var(--bg);background:var(--ac2)}
.wb{background:rgba(180,83,9,.15);border:1px solid rgba(180,83,9,.3);border-radius:5px;padding:5px 9px;margin:3px 0;font-size:.82rem;color:var(--wn);font-weight:600}
.btnrow{display:flex;gap:8px;margin:10px 0 5px}
.btn{padding:7px 12px;border-radius:6px;font-size:.78rem;font-weight:600;border:1px solid var(--bd);background:rgba(30,41,59,.6);color:var(--dm);cursor:pointer;flex:1;text-align:center}
.btn:hover,.btn:active{background:rgba(59,130,246,.15);color:var(--ac2);border-color:var(--ac)}
.btn.ld{color:var(--ok);border-color:rgba(74,222,128,.3)}
.slist{font-size:.72rem;color:var(--dmr);margin-top:4px;max-height:120px;overflow-y:auto}
.slist div{padding:4px 6px;cursor:pointer;border-radius:4px;display:flex;justify-content:space-between;align-items:center}
.slist div:hover,.slist div:active{background:rgba(59,130,246,.1);color:var(--ac3)}
.slist .del{cursor:pointer;padding:2px 6px}
.slist .ow{color:var(--wn)}.slist .rm{color:var(--ng)}

/* MTF box */
.mtfbox{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:6px;padding:8px 10px;margin-top:4px}
.mtfrow{display:flex;align-items:center;gap:4px;margin-bottom:3px;font-size:.85rem}
.mtfrow .ml{color:var(--dm);min-width:90px}
.mtfrow .mv{color:var(--mg);font-weight:700;font-family:'Courier New',monospace}
.mtfrow .mu{color:var(--dmr);font-size:.72rem}

/* Calc tool */
.calcbox{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:6px;padding:8px 10px;margin-top:4px}
.calcR{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.calcR label{font-size:.84rem;color:var(--dm);min-width:80px}
.calcR .cv{color:var(--ac3);font-weight:600;font-family:'Courier New',monospace;font-size:.88rem}
.cbtn{padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:700;border:1px solid var(--mg);background:rgba(192,132,252,.12);color:var(--mg);cursor:pointer;margin-top:2px}
.cbtn:hover,.cbtn:active{background:rgba(192,132,252,.25)}

/* Right */
.diagArea{display:flex;gap:6px;flex:1;min-height:0;overflow:hidden}
.mainDiag{flex:1;min-width:0}
.sideDiag,.fovDiag{width:180px;flex-shrink:0}
@media(max-width:960px){.sideDiag,.fovDiag{width:140px}}
.results{display:flex;flex-wrap:wrap;gap:4px 14px;padding:6px 0;border-top:1px solid var(--bd);font-size:.88rem;flex-shrink:0}
.rv{display:flex;gap:4px;align-items:baseline}
.rv .rl{color:var(--dm)}.rv .rval{color:var(--ac3);font-weight:600;font-family:'Courier New',monospace}
.rv .ru{color:var(--dmr);font-size:.72rem}
.rv.big .rval{color:var(--ac2);font-size:1.15rem;font-weight:700}
.rv.ng .rval{color:var(--ng)}.rv.wn .rval{color:var(--wn)}.rv.mtf .rval{color:var(--mg)}
.left::-webkit-scrollbar{width:5px}.left::-webkit-scrollbar-track{background:transparent}.left::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
<div class="tabbar" id="TB">
  <button class="act" onclick="showTab('params')">パラメータ</button>
  <button onclick="showTab('diagram')">レイアウト図</button>
</div>
<div class="left" id="PNL">
  <h1>CT シミュレーター</h1>
  <div class="su">汎用シングル系統</div>

  <div class="st">FDD / FOD</div>
  <div class="R"><label>FDD:</label><input type="number" class="ni" id="FDD" step="1" value="500"><span class="U">mm</span></div>
  <div class="sw"><input type="range" id="SL" min="30" max="1500" step="1" value="500"></div>
  <div class="R"><label>FOD:</label><input type="number" class="ni" id="FOD" step="0.1" value="28"><span class="U">mm</span><span class="ht" id="HT"></span></div>
  <div class="sw"><input type="range" id="SLF" min="1" max="200" step="0.5" value="28"></div>
  <div id="WN"></div>

  <div class="sec"><div class="st">線源パラメータ</div></div>
  <div class="R"><label>焦点–出射口距離:</label><input type="number" class="ni" id="FE" step="0.1" value="5"><span class="U">mm</span></div>
  <div class="R"><label>コリメータ厚:</label><input type="number" class="ni" id="CL" step="0.1" value="10"><span class="U">mm</span></div>
  <div class="R"><label>ギャップ:</label><input type="number" class="ni" id="GP" step="0.1" value="5"><span class="U">mm</span></div>
  <div class="R"><label>焦点径:</label><input type="number" class="ni" id="FS" step="0.1" value="5"><span class="U">μm</span></div>
  <div class="R"><label>X線源ファン角:</label><input type="number" class="ni" id="FAN" step="0.1" value="0"><span class="U">°</span><span class="ht">(全角)</span></div>
  <div class="R"><label>受光ファン角:</label><span class="mono" style="color:var(--ac3);font-size:.92rem" id="RF"></span><span class="ht">(自動)</span></div>
  <div id="FA"></div>

  <div class="sec"><div class="st">検出器</div></div>
  <div class="R"><label>画素ピッチ:</label><input type="number" class="ni" id="PP" step="0.1" value="139"><span class="U">μm</span></div>
  <div class="R"><label>横 (pix):</label><input type="number" class="ni" id="PH" step="1" value="3072"><span class="U">pix</span></div>
  <div class="R"><label>縦 (pix):</label><input type="number" class="ni" id="PV" step="1" value="3060"><span class="U">pix</span></div>

  <div class="sec"><div class="st">ゴニオ（斜めCT）</div></div>
  <div class="R"><label>傾斜角:</label><input type="number" class="ni" id="GT" step="1" value="0"><span class="U">°</span></div>

  <div class="sec"><div class="st">サンプル</div></div>
  <div class="R"><label>直径 (φ):</label><input type="number" class="ni" id="SW" step="0.1" value="16"><span class="U">mm</span></div>
  <div class="R"><label>高さ (H):</label><input type="number" class="ni" id="SH" step="0.1" value="16"><span class="U">mm</span></div>

  <!-- MTF section -->
  <div class="sec"><div class="st">MTF理論限界 / 焦点ボケ</div></div>
  <div class="mtfbox">
    <div id="MTF"></div>
    <div style="border-top:1px solid rgba(99,102,241,.2);margin:6px 0;padding-top:6px">
      <div class="calcR"><label style="min-width:100px">実効ボクセル:</label><input type="number" class="nis" id="MVOX" step="0.1" value="" placeholder="μm"><span class="U">μm</span>
        <button class="cbtn" style="margin:0;padding:4px 10px;font-size:.78rem" id="BMTF">MTF計算</button>
      </div>
      <div class="calcR"><label style="min-width:100px">結果:</label><span class="cv" id="MOUT" style="word-break:break-all;font-size:.84rem">--</span></div>
    </div>
  </div>

  <!-- Calc tool -->
  <div class="sec"><div class="st">最大径 ⇔ 実効ボクセル 計算</div></div>
  <div class="calcbox">
    <div class="calcR"><label>最大径:</label><input type="number" class="nis" id="CDIA" step="0.1" value="" placeholder="φmm"><span class="U">mm</span></div>
    <div class="calcR"><label>ボクセル:</label><input type="number" class="nis" id="CRES" step="0.1" value="" placeholder="μm"><span class="U">μm</span></div>
    <div class="calcR" style="flex-wrap:wrap"><label>結果:</label><span class="cv" id="COUT" style="word-break:break-all">--</span></div>
    <button class="cbtn" id="BCALC">計算</button>
  </div>

  <div class="sec"><div class="st">設定の保存</div></div>
  <div class="btnrow">
    <button class="btn" id="BSAVE">💾 保存</button>
    <button class="btn ld" id="BLOAD">📂 読込</button>
  </div>
  <div class="slist" id="SV"></div>
  <div style="height:40px"></div>
</div>

<div class="right" id="DIA">
  <div class="diagArea">
    <div class="mainDiag" id="DG"></div>
    <div class="sideDiag" id="SD"></div>
    <div class="fovDiag" id="FV"></div>
  </div>
  <div class="results" id="RS"></div>
</div>
</div>

<script>
(function(){
"use strict";

var IDS=["FDD","FOD","FE","CL","GP","FS","FAN","PP","PH","PV","GT","SW","SH"];
var $=function(id){return document.getElementById(id)};
function gv(id){var v=parseFloat($(id).value);return isNaN(v)?0:v}
function fm(v,d){d=d==null?2:d;return Math.abs(v)<0.001?"0":v.toFixed(d)}
function ns(t,a){var e=document.createElementNS("http://www.w3.org/2000/svg",t);if(a)for(var k in a)e.setAttribute(k,a[k]);return e}
function tx(x,y,s,a){var t=ns("text",Object.assign({x:x,y:y},a||{}));t.textContent=s;return t}

function rdP(){
  return{fdd:gv("FDD"),fod:gv("FOD"),fe:gv("FE"),cl:gv("CL"),gp:gv("GP"),fs:gv("FS"),fan:gv("FAN"),
    pp:gv("PP"),pH:gv("PH"),pV:gv("PV"),gt:gv("GT"),sw:gv("SW"),sh:gv("SH")}
}
function fodMin(p){return p.fe+p.cl+p.gp}

function calc(p){
  var fod=Math.max(p.fod,0.01),fdd=Math.max(p.fdd,1);
  var mag=fdd/fod,res=p.pp/mag;
  var dW=p.pH*p.pp/1000,dH=p.pV*p.pp/1000;
  var fovH=dW/mag,fovV=dH/mag;
  var recvFan=2*Math.atan(dW/2/fdd)*180/Math.PI;
  var srcFan=p.fan;
  var halfRad=(srcFan>0?srcFan:recvFan)/2*Math.PI/180;
  var beamW=2*fdd*Math.tan(halfRad);
  var recvOverSrc=srcFan>0&&recvFan>srcFan;
  var tilt=p.gt||0,rad=tilt*Math.PI/180;
  var projW=p.sw*Math.cos(rad)+p.sh*Math.sin(rad);
  var projH=p.sw*Math.sin(rad)+p.sh*Math.cos(rad);

  // MTF: 焦点ボケ = f*(M-1)  [μm]
  var focalBlur=p.fs*(mag-1);
  // 分解能理論限界 = sqrt(焦点ボケ^2 + (pp/M)^2) [μm]
  var detBlur=p.pp/mag;
  var mtfRes=Math.sqrt(focalBlur*focalBlur+detBlur*detBlur);
  // 最適倍率: d(mtfRes)/dM=0 → M_opt = pp / f (when f>0)
  // mtfRes^2 = f^2*(M-1)^2 + (pp/M)^2
  // d/dM = 2*f^2*(M-1) - 2*pp^2/M^3 = 0
  // f^2*(M-1) = pp^2/M^3
  // Solve numerically
  var optMag=0,optRes=0,optFOD=0;
  if(p.fs>0){
    // Newton's method: find M where f^2*(M-1)*M^3 - pp^2 = 0
    var ff=p.fs,pp2=p.pp;
    var M=pp2/ff; // initial guess
    if(M<1.01)M=1.5;
    for(var it=0;it<50;it++){
      var fn=ff*ff*(M-1)*M*M*M-pp2*pp2;
      var dfn=ff*ff*(4*M*M*M-3*M*M);
      if(Math.abs(dfn)<1e-20)break;
      var Mn=M-fn/dfn;
      if(Mn<1.001)Mn=1.001;
      if(Math.abs(Mn-M)<1e-10)break;
      M=Mn;
    }
    optMag=M;
    var ob=ff*(M-1),od=pp2/M;
    optRes=Math.sqrt(ob*ob+od*od);
    optFOD=fdd/M;
  }

  return{fod:fod,fdd:fdd,mag:mag,res:res,fovH:fovH,fovV:fovV,dW:dW,dH:dH,
    recvFan:recvFan,srcFan:srcFan,halfRad:halfRad,beamW:beamW,
    recvOverSrc:recvOverSrc,tilt:tilt,projW:projW,projH:projH,
    focalBlur:focalBlur,detBlur:detBlur,mtfRes:mtfRes,
    optMag:optMag,optRes:optRes,optFOD:optFOD}
}

function doWarn(p){
  var mn=fodMin(p),c=calc(p),hw=c.projW/2,msgs=[];
  if(p.fod<mn)msgs.push("⚠ FOD < 下限("+fm(mn)+"mm)");
  else if(p.fod<mn+hw)msgs.push("⚠ サンプル端(半幅"+fm(hw,1)+"mm)がコリメータ域に接触の恐れ");
  if(p.fdd>0&&p.fod>=p.fdd)msgs.push("⚠ FOD ≧ FDD");
  $("WN").innerHTML=msgs.length?'<div class="wb">'+msgs.join("<br>")+'</div>':"";
  $("HT").textContent="(下限:"+fm(mn)+"mm)";
}

/* ========== MTF display ========== */
function mkMTF(c,p){
  var h='';
  h+='<div class="mtfrow"><span class="ml">焦点ボケ:</span><span class="mv">'+fm(c.focalBlur,3)+'</span><span class="mu">μm</span><span class="mu" style="margin-left:6px">[f×(M−1) = '+fm(p.fs,1)+'×('+fm(c.mag,1)+'−1)]</span></div>';
  h+='<div class="mtfrow"><span class="ml">検出器ボケ:</span><span class="mv">'+fm(c.detBlur,3)+'</span><span class="mu">μm</span><span class="mu" style="margin-left:6px">[pp/M = '+fm(p.pp,1)+'/'+fm(c.mag,1)+']</span></div>';
  h+='<div class="mtfrow"><span class="ml">MTF限界:</span><span class="mv" style="font-size:1rem">'+fm(c.mtfRes,3)+'</span><span class="mu">μm</span></div>';
  if(c.optMag>0){
    h+='<div style="border-top:1px solid rgba(99,102,241,.2);margin:4px 0;padding-top:4px"></div>';
    h+='<div class="mtfrow"><span class="ml">最適倍率:</span><span class="mv">×'+fm(c.optMag,2)+'</span><span class="mu">(FOD '+fm(c.optFOD,1)+'mm)</span></div>';
    h+='<div class="mtfrow"><span class="ml">最小分解能:</span><span class="mv">'+fm(c.optRes,3)+'</span><span class="mu">μm</span></div>';
  }
  $("MTF").innerHTML=h;
}

/* ========== TOP VIEW ========== */
function drawTop(p,c){
  var el=$("DG"),W=el.offsetWidth||el.clientWidth||500,H=el.offsetHeight||el.clientHeight||300;
  if(W<50)W=500;if(H<50)H=300;
  var ml=55,mr=15,mt=35,mb=35,pW=W-ml-mr,pH2=H-mt-mb,maxH=pH2*0.42;
  var fddMax=1500,sc=pW/(fddMax*1.05);
  var sx=ml,dx=sx+p.fdd*sc,rx=sx+c.fod*sc,cy=H/2;
  var recvHR=c.recvFan/2*Math.PI/180;
  var srcHR=c.srcFan>0?(c.srcFan/2*Math.PI/180):0;
  function tae(hr,tl){
    if(hr>=Math.PI/2*.98)return{ex:sx+3,h:maxH};
    var h=tl*Math.tan(hr);if(h<=maxH)return{ex:sx+tl,h:h};
    return{ex:sx+maxH/Math.tan(hr),h:maxH};
  }
  var svg=ns("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H});
  var df=ns("defs");
  var ga=ns("linearGradient",{id:"gA",x1:"0%",y1:"0%",x2:"100%",y2:"0%"});
  ga.appendChild(ns("stop",{offset:"0%","stop-color":"#3b82f6","stop-opacity":"0.5"}));
  ga.appendChild(ns("stop",{offset:"100%","stop-color":"#3b82f6","stop-opacity":"0.05"}));
  df.appendChild(ga);
  var cp=ns("clipPath",{id:"srcClip"});cp.appendChild(ns("rect",{x:ml-5,y:mt-5,width:pW+10,height:pH2+10}));
  df.appendChild(cp);svg.appendChild(df);
  svg.appendChild(ns("rect",{x:ml-5,y:mt-5,width:pW+10,height:pH2+10,fill:"#060b16",rx:"5"}));
  if(c.srcFan>0){
    var se=tae(srcHR,pW);
    var g=ns("g",{"clip-path":"url(#srcClip)"});
    g.appendChild(ns("polygon",{points:sx+","+cy+" "+se.ex+","+(cy-se.h)+" "+se.ex+","+(cy+se.h),fill:"url(#gA)",opacity:"0.18"}));
    g.appendChild(ns("line",{x1:sx,y1:cy,x2:se.ex,y2:cy-se.h,stroke:"#3b82f6","stroke-width":"1","stroke-dasharray":"6,3",opacity:"0.4"}));
    g.appendChild(ns("line",{x1:sx,y1:cy,x2:se.ex,y2:cy+se.h,stroke:"#3b82f6","stroke-width":"1","stroke-dasharray":"6,3",opacity:"0.4"}));
    svg.appendChild(g);
    var sl=tae(srcHR,55);
    svg.appendChild(tx(sx+58,cy-sl.h-3,"線源"+fm(c.srcFan,1)+"°",{fill:"#93c5fd","font-size":"12",opacity:"0.65","font-weight":"bold"}));
  }
  var re=tae(recvHR,dx-sx);var hDet=re.h;
  svg.appendChild(ns("polygon",{points:sx+","+cy+" "+re.ex+","+(cy-hDet)+" "+re.ex+","+(cy+hDet),fill:"url(#gA)",opacity:"0.5"}));
  svg.appendChild(ns("line",{x1:sx,y1:cy,x2:re.ex,y2:cy-hDet,stroke:"#3b82f6","stroke-width":"1.2",opacity:"0.8"}));
  svg.appendChild(ns("line",{x1:sx,y1:cy,x2:re.ex,y2:cy+hDet,stroke:"#3b82f6","stroke-width":"1.2",opacity:"0.8"}));
  var rl2=tae(recvHR,30);
  svg.appendChild(tx(sx+33,cy+rl2.h+14,"受光"+fm(c.recvFan,1)+"°",{fill:"#93c5fd","font-size":"12","font-weight":"600"}));
  svg.appendChild(ns("rect",{x:sx-14,y:cy-14,width:"14",height:"28",fill:"#2563eb",rx:"3",stroke:"#93c5fd","stroke-width":"1"}));
  svg.appendChild(tx(sx-7,cy+4,"S",{"text-anchor":"middle",fill:"white","font-size":"12","font-weight":"bold"}));
  var sR=Math.max(Math.min(p.sw/2*sc*0.5,30),3);
  svg.appendChild(ns("circle",{cx:rx,cy:cy,r:sR,fill:"rgba(74,222,128,.1)",stroke:"#4ade80","stroke-width":"1.5","stroke-dasharray":"3,2"}));
  svg.appendChild(ns("circle",{cx:rx,cy:cy,r:"2",fill:"#4ade80"}));
  svg.appendChild(tx(rx,cy+sR+12,"φ"+fm(p.sw,1)+"×H"+fm(p.sh,1),{"text-anchor":"middle",fill:"#86efac","font-size":"12"}));
  svg.appendChild(ns("line",{x1:dx,y1:cy-hDet,x2:dx,y2:cy+hDet,stroke:"#60a5fa","stroke-width":"3"}));
  svg.appendChild(tx(dx+5,cy-hDet-6,"検出器",{fill:"#93c5fd","font-size":"12","font-weight":"600"}));
  if(c.recvOverSrc){
    var sa=tae(srcHR,dx-sx);
    svg.appendChild(ns("line",{x1:dx,y1:cy-hDet,x2:dx,y2:cy-sa.h,stroke:"#fbbf24","stroke-width":"2.5","stroke-dasharray":"3,2"}));
    svg.appendChild(ns("line",{x1:dx,y1:cy+sa.h,x2:dx,y2:cy+hDet,stroke:"#fbbf24","stroke-width":"2.5","stroke-dasharray":"3,2"}));
    svg.appendChild(ns("rect",{x:dx-32,y:cy-hDet-18,width:"64",height:"14",fill:"rgba(180,83,9,.9)",rx:"3"}));
    svg.appendChild(tx(dx,cy-hDet-8,"NG 未照射",{"text-anchor":"middle",fill:"#fbbf24","font-size":"12","font-weight":"bold"}));
  }
  var ix=Math.min(dx+6,W-200),iy=cy+hDet*0.1;
  var bH=c.recvOverSrc?90:72;
  svg.appendChild(ns("rect",{x:ix,y:iy,width:"195",height:bH,fill:"rgba(30,58,95,.6)",rx:"4",stroke:"#3b82f6","stroke-width":"0.5"}));
  svg.appendChild(tx(ix+6,iy+16,"×"+fm(c.mag,1)+"倍  解像度 "+fm(c.res,3)+"μm",{fill:"#bfdbfe","font-size":"12"}));
  svg.appendChild(tx(ix+6,iy+33,"MTF限界 "+fm(c.mtfRes,3)+"μm",{fill:"#c084fc","font-size":"12","font-weight":"600"}));
  svg.appendChild(tx(ix+6,iy+50,"視野 "+fm(c.fovH,1)+"×"+fm(c.fovV,1)+"mm",{fill:"#93c5fd","font-size":"12"}));
  svg.appendChild(tx(ix+6,iy+65,(c.srcFan>0?"線源"+fm(c.srcFan,1)+"° / ":"")+"受光角"+fm(c.recvFan,1)+"°",{fill:"#93c5fd","font-size":"12"}));
  if(c.recvOverSrc)svg.appendChild(tx(ix+6,iy+80,"⚠ 受光角 > 線源ファン角!",{fill:"#f87171","font-size":"12","font-weight":"bold"}));
  svg.appendChild(ns("line",{x1:sx,y1:mt-16,x2:dx,y2:mt-16,stroke:"#60a5fa","stroke-width":"0.8"}));
  svg.appendChild(tx((sx+dx)/2,mt-20,"FDD "+fm(p.fdd,0)+"mm",{"text-anchor":"middle",fill:"#93c5fd","font-size":"12"}));
  svg.appendChild(ns("line",{x1:sx,y1:H-mb+14,x2:rx,y2:H-mb+14,stroke:"#4ade80","stroke-width":"0.8"}));
  svg.appendChild(tx((sx+rx)/2,H-mb+12,"FOD "+fm(p.fod)+"mm",{"text-anchor":"middle",fill:"#86efac","font-size":"12"}));
  return svg;
}

/* ========== SIDE VIEW ========== */
function drawSide(p,c){
  var el=$("SD"),W=170,H=el.offsetHeight||el.clientHeight||300;
  if(H<50)H=300;
  var svg=ns("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H});
  svg.appendChild(ns("rect",{x:"0",y:"0",width:W,height:H,fill:"#060b16",rx:"4"}));
  svg.appendChild(tx(W/2,16,"側面図",{"text-anchor":"middle",fill:"#94a3b8","font-size":"13","font-weight":"bold"}));
  var mt=28,mb=40,cx=W/2,areaW=W-30,areaH=H-mt-mb;
  var beamY=mt+areaH*0.5;
  svg.appendChild(ns("line",{x1:"6",y1:beamY,x2:W-6,y2:beamY,stroke:"#3b82f6","stroke-width":"1","stroke-dasharray":"4,2",opacity:"0.5"}));
  svg.appendChild(tx(10,beamY-5,"X線",{fill:"#93c5fd","font-size":"12",opacity:"0.6"}));
  var tilt=c.tilt,maxW=tilt>0?c.projW:p.sw,maxHt=tilt>0?c.projH:p.sh;
  var scS=Math.min((areaW-40)/Math.max(maxW,0.1),(areaH-50)/Math.max(maxHt,0.1));
  var sw=p.sw*scS,sh=p.sh*scS;
  if(tilt>0){
    var g=ns("g",{transform:"rotate("+(-tilt)+","+cx+","+beamY+")"});
    g.appendChild(ns("rect",{x:cx-sw/2,y:beamY-sh/2,width:sw,height:sh,fill:"rgba(74,222,128,.08)",stroke:"#4ade80","stroke-width":"1.3",rx:"2"}));
    svg.appendChild(g);
    var pwPx=c.projW*scS,phPx=c.projH*scS;
    var dimY1=beamY+phPx/2+10;
    svg.appendChild(ns("line",{x1:cx-pwPx/2,y1:dimY1,x2:cx+pwPx/2,y2:dimY1,stroke:"#fb923c","stroke-width":"1.5"}));
    svg.appendChild(ns("line",{x1:cx-pwPx/2,y1:dimY1-4,x2:cx-pwPx/2,y2:dimY1+4,stroke:"#fb923c","stroke-width":"1"}));
    svg.appendChild(ns("line",{x1:cx+pwPx/2,y1:dimY1-4,x2:cx+pwPx/2,y2:dimY1+4,stroke:"#fb923c","stroke-width":"1"}));
    svg.appendChild(tx(cx,dimY1+14,"見かけ幅 "+fm(c.projW,1)+"mm",{"text-anchor":"middle",fill:"#fb923c","font-size":"12","font-weight":"600"}));
    var dimX1=cx-pwPx/2-10;
    svg.appendChild(ns("line",{x1:dimX1,y1:beamY-phPx/2,x2:dimX1,y2:beamY+phPx/2,stroke:"#a78bfa","stroke-width":"1.5"}));
    svg.appendChild(ns("line",{x1:dimX1-4,y1:beamY-phPx/2,x2:dimX1+4,y2:beamY-phPx/2,stroke:"#a78bfa","stroke-width":"1"}));
    svg.appendChild(ns("line",{x1:dimX1-4,y1:beamY+phPx/2,x2:dimX1+4,y2:beamY+phPx/2,stroke:"#a78bfa","stroke-width":"1"}));
    svg.appendChild(tx(dimX1-3,beamY+4,fm(c.projH,1),{"text-anchor":"end",fill:"#a78bfa","font-size":"12","font-weight":"600"}));
    svg.appendChild(tx(cx,beamY-phPx/2-10,"傾斜 "+fm(tilt,0)+"°",{"text-anchor":"middle",fill:"#fbbf24","font-size":"13","font-weight":"700"}));
  }else{
    svg.appendChild(ns("rect",{x:cx-sw/2,y:beamY-sh/2,width:sw,height:sh,fill:"rgba(74,222,128,.08)",stroke:"#4ade80","stroke-width":"1.3",rx:"2"}));
    svg.appendChild(tx(cx,beamY+sh/2+16,"φ"+fm(p.sw,1)+"×H"+fm(p.sh,1),{"text-anchor":"middle",fill:"#86efac","font-size":"12"}));
    svg.appendChild(tx(cx,H-mb+10,"傾斜なし",{"text-anchor":"middle",fill:"#475569","font-size":"12"}));
  }
  return svg;
}

/* ========== FRONT VIEW ========== */
function drawFront(c,p){
  var el=$("FV"),W=170,H=el.offsetHeight||el.clientHeight||300;
  if(H<50)H=300;
  var svg=ns("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H});
  svg.appendChild(ns("rect",{x:"0",y:"0",width:W,height:H,fill:"#060b16",rx:"4"}));
  svg.appendChild(tx(W/2,16,"正面図",{"text-anchor":"middle",fill:"#94a3b8","font-size":"13","font-weight":"bold"}));
  var mt=28,mb=40,areaW=W-24,areaH=H-mt-mb,cx=W/2,cy=mt+areaH/2;
  var sW=c.tilt>0?c.projW:p.sw,sH=c.tilt>0?c.projH:p.sh;
  var maxW=Math.max(c.fovH,sW)*1.15,maxHt=Math.max(c.fovV,sH)*1.15;
  if(maxW<0.01)maxW=1;if(maxHt<0.01)maxHt=1;
  var sc=Math.min(areaW/maxW,areaH/maxHt);
  var fw=c.fovH*sc,fh=c.fovV*sc;
  svg.appendChild(ns("rect",{x:cx-fw/2,y:cy-fh/2,width:Math.max(fw,1),height:Math.max(fh,1),fill:"rgba(59,130,246,.05)",stroke:"#3b82f6","stroke-width":"1.5","stroke-dasharray":"5,3",rx:"2"}));
  svg.appendChild(tx(cx,cy-fh/2-6,"視野 "+fm(c.fovH,1)+"×"+fm(c.fovV,1)+"mm",{"text-anchor":"middle",fill:"#60a5fa","font-size":"12"}));
  var spW=sW*sc,spH=sH*sc;
  var okW=c.fovH>=sW,okH=c.fovV>=sH,ok=okW&&okH;
  var clr=ok?"#4ade80":"#f87171",clr2=ok?"#86efac":"#fca5a5",bg2=ok?"rgba(74,222,128,.1)":"rgba(248,113,113,.1)";
  svg.appendChild(ns("rect",{x:cx-spW/2,y:cy-spH/2,width:Math.max(spW,1),height:Math.max(spH,1),fill:bg2,stroke:clr,"stroke-width":"1.3",rx:"2"}));
  var slbl=c.tilt>0?"見かけ "+fm(sW,1)+"×"+fm(sH,1):"φ"+fm(p.sw,1)+"×H"+fm(p.sh,1);
  svg.appendChild(tx(cx,cy+3,slbl,{"text-anchor":"middle",fill:clr2,"font-size":"12","font-weight":"600"}));
  var dy=cy+spH/2+10;
  svg.appendChild(ns("line",{x1:cx-spW/2,y1:dy,x2:cx+spW/2,y2:dy,stroke:clr,"stroke-width":"1"}));
  svg.appendChild(tx(cx,dy+14,fm(sW,1)+"mm",{"text-anchor":"middle",fill:clr2,"font-size":"12"}));
  var ddx=cx-spW/2-8;
  svg.appendChild(ns("line",{x1:ddx,y1:cy-spH/2,x2:ddx,y2:cy+spH/2,stroke:clr,"stroke-width":"1"}));
  svg.appendChild(tx(ddx-3,cy+4,fm(sH,1),{"text-anchor":"end",fill:clr2,"font-size":"12"}));
  var msg=ok?"✔ 視野内OK":("✘ "+(okW?"":"横")+(okH?"":"縦")+"はみ出し");
  svg.appendChild(tx(cx,H-mb+16,msg,{"text-anchor":"middle",fill:ok?"#4ade80":"#f87171","font-size":"13","font-weight":"bold"}));
  return svg;
}

/* ========== RESULTS ========== */
function mkResults(c){
  var h="";
  function rv(l,v,u,cls){h+='<div class="rv'+(cls?" "+cls:"")+'"><span class="rl">'+l+'</span><span class="rval">'+v+'</span><span class="ru">'+u+'</span></div>'}
  rv("倍率","×"+fm(c.mag,1),"","");
  rv("解像度",fm(c.res,3),"μm","big");
  rv("MTF限界",fm(c.mtfRes,3),"μm","mtf");
  rv("視野",fm(c.fovH,2)+"×"+fm(c.fovV,2),"mm","");
  rv("受光角",fm(c.recvFan,1),"°","");
  if(c.srcFan>0)rv("線源角",fm(c.srcFan,1),"°",c.recvOverSrc?"ng":"");
  rv("ビーム幅",fm(c.beamW,1),"mm","");
  rv("検出器幅",fm(c.dW,1),"mm","");
  if(c.tilt>0){
    rv("傾斜角",fm(c.tilt,0),"°","wn");
    rv("見かけ幅",fm(c.projW,2),"mm","wn");
    rv("見かけ高さ",fm(c.projH,2),"mm","wn");
  }
  if(c.optMag>0)rv("最適倍率","×"+fm(c.optMag,2)+" ("+fm(c.optRes,3)+"μm)","","mtf");
  if(c.recvOverSrc)h+='<div class="rv ng"><span class="rval">⚠ 受光角 > 線源ファン角 NG</span></div>';
  $("RS").innerHTML=h;
}

/* ========== Calc tool ========== */
$("BCALC").addEventListener("click",function(){
  var diaIn=parseFloat($("CDIA").value);
  var voxIn=parseFloat($("CRES").value);
  var p=rdP();
  var fdd=Math.max(p.fdd,1),pp=p.pp;
  var dW=p.pH*pp/1000; // detector width [mm]

  var hasDia=!isNaN(diaIn)&&diaIn>0;
  var hasVox=!isNaN(voxIn)&&voxIn>0;

  if(hasDia&&!hasVox){
    // 最大径 → 実効ボクセル
    // サンプルがFOVに収まる: FOV_H >= dia → dW/M >= dia → M <= dW/dia
    var M=dW/diaIn;
    if(M<1.001)M=1.001;
    var fod=fdd/M;
    var voxel=pp/M; // 実効ボクセルサイズ [μm]
    var fb=p.fs*(M-1),db=pp/M;
    var mtf=Math.sqrt(fb*fb+db*db);
    $("CRES").value="";
    $("COUT").textContent="φ"+fm(diaIn,1)+"mm → 倍率×"+fm(M,2)+" / FOD "+fm(fod,2)+"mm / 実効ボクセル "+fm(voxel,3)+"μm / MTF限界 "+fm(mtf,3)+"μm";
  }else if(hasVox&&!hasDia){
    // 実効ボクセル → 最大径
    // voxel = pp/M → M = pp/voxel
    var M2=pp/voxIn;
    if(M2<1.001)M2=1.001;
    var fod2=fdd/M2;
    var maxDia=dW/M2; // FOV_H = 最大径 [mm]
    var fb2=p.fs*(M2-1),db2=pp/M2;
    var mtf2=Math.sqrt(fb2*fb2+db2*db2);
    $("CDIA").value="";
    $("COUT").textContent="ボクセル "+fm(voxIn,1)+"μm → 倍率×"+fm(M2,2)+" / FOD "+fm(fod2,2)+"mm / 最大径φ"+fm(maxDia,2)+"mm / MTF限界 "+fm(mtf2,3)+"μm";
  }else if(hasDia&&hasVox){
    $("COUT").textContent="どちらか一方だけ入力してください";
  }else{
    $("COUT").textContent="最大径またはボクセルサイズを入力してください";
  }
});

/* ========== MTF from voxel input ========== */
$("BMTF").addEventListener("click",function(){
  var vox=parseFloat($("MVOX").value);
  if(isNaN(vox)||vox<=0){$("MOUT").textContent="実効ボクセルを入力してください";return}
  var p=rdP();
  var fdd=Math.max(p.fdd,1),pp=p.pp,fs=p.fs;
  // voxel = pp/M → M = pp/voxel
  var M=pp/vox;
  if(M<1.001)M=1.001;
  var fod=fdd/M;
  var focalBlur=fs*(M-1);
  var detBlur=pp/M; // = vox
  var mtf=Math.sqrt(focalBlur*focalBlur+detBlur*detBlur);
  var dW=p.pH*pp/1000;
  var maxDia=dW/M;
  $("MOUT").textContent="ボクセル "+fm(vox,2)+"μm → 倍率×"+fm(M,2)
    +" / FOD "+fm(fod,2)+"mm / 焦点ボケ "+fm(focalBlur,3)+"μm / MTF限界 "+fm(mtf,3)+"μm"
    +" / 最大径φ"+fm(maxDia,2)+"mm";
});

/* ========== SAVE/LOAD ========== */
function getSaves(){try{return JSON.parse(localStorage.getItem("ct_saves")||"[]")}catch(e){return[]}}
function putSaves(a){localStorage.setItem("ct_saves",JSON.stringify(a))}
function renderSaves(){
  var s=getSaves(),el=$("SV");
  if(!s.length){el.innerHTML='<div style="padding:4px;color:#475569">保存データなし</div>';return}
  el.innerHTML=s.map(function(v,i){
    return '<div><span style="flex:1" data-act="load" data-i="'+i+'">'+v.name+'</span>'
      +'<span class="del ow" data-act="ow" data-i="'+i+'" title="上書き">↑</span>'
      +'<span class="del rm" data-act="rm" data-i="'+i+'" title="削除">✕</span></div>';
  }).join("");
}
$("SV").addEventListener("click",function(e){
  var t=e.target,act=t.getAttribute("data-act"),i=parseInt(t.getAttribute("data-i"));
  if(!act||isNaN(i))return;
  var saves=getSaves();if(!saves[i])return;
  if(act==="load"){
    var d=saves[i].data;
    IDS.forEach(function(id){if(d[id]!=null)$(id).value=d[id]});
    update();
  }else if(act==="ow"){
    if(!confirm("「"+saves[i].name+"」を現在の設定で上書きしますか？"))return;
    var data={};IDS.forEach(function(id){data[id]=gv(id)});
    saves[i].data=data;putSaves(saves);renderSaves();
  }else if(act==="rm"){
    if(!confirm("「"+saves[i].name+"」を削除しますか？"))return;
    saves.splice(i,1);putSaves(saves);renderSaves();
  }
});
$("BSAVE").addEventListener("click",function(){
  var saves=getSaves();
  var name=prompt("設定名を入力:","設定"+(saves.length+1));
  if(!name)return;
  var data={};IDS.forEach(function(id){data[id]=gv(id)});
  for(var i=0;i<saves.length;i++){
    if(saves[i].name===name){
      if(!confirm("「"+name+"」を上書きしますか？"))return;
      saves[i].data=data;putSaves(saves);renderSaves();return;
    }
  }
  saves.push({name:name,data:data});putSaves(saves);renderSaves();
});
$("BLOAD").addEventListener("click",function(){
  if(!getSaves().length){alert("保存データがありません");return}
  renderSaves();
});

/* ========== TABS ========== */
window.showTab=function(tab){
  var btns=$("TB").querySelectorAll("button");
  btns[0].className=tab==="params"?"act":"";
  btns[1].className=tab==="diagram"?"act":"";
  if(tab==="params"){$("PNL").classList.remove("hide");$("DIA").classList.add("hide")}
  else{$("PNL").classList.add("hide");$("DIA").classList.remove("hide");setTimeout(update,50)}
};

/* ========== MAIN UPDATE ========== */
function update(){
  var p=rdP();doWarn(p);var c=calc(p);
  $("SL").value=p.fdd;
  $("SLF").value=p.fod;
  $("RF").textContent=fm(c.recvFan,1)+"°";
  $("FA").innerHTML=c.recvOverSrc?'<div class="wb">⚠ NG: 受光角('+fm(c.recvFan,1)+'°) > 線源('+fm(c.srcFan,1)+'°)</div>':"";
  var dg=$("DG");dg.innerHTML="";dg.appendChild(drawTop(p,c));
  var sd=$("SD");sd.innerHTML="";sd.appendChild(drawSide(p,c));
  var fv=$("FV");fv.innerHTML="";fv.appendChild(drawFront(c,p));
  mkResults(c);
  mkMTF(c,p);
}

/* ========== EVENTS ========== */
$("SL").addEventListener("input",function(){$("FDD").value=this.value;update()});
$("SLF").addEventListener("input",function(){$("FOD").value=this.value;update()});
["FE","CL","GP"].forEach(function(id){
  $(id).addEventListener("input",function(){
    var p=rdP(),mn=fodMin(p),c=calc(p);
    if(p.fod<mn+c.projW/2)$("FOD").value=fm(mn+c.projW/2);
    update();
  });
});
IDS.forEach(function(id){$(id).addEventListener("input",function(){update()})});
var rto;
window.addEventListener("resize",function(){clearTimeout(rto);rto=setTimeout(update,150)});

$("FOD").value=fm(5+10+5+16/2);
renderSaves();
update();
setTimeout(update,200);
})();
</script>
