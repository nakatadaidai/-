<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>CT シミュレーター v9</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1a;--card:#111827;--bd:#1e293b;--ac:#3b82f6;--ac2:#60a5fa;--ac3:#93c5fd;--tx:#e2e8f0;--dm:#94a3b8;--dmr:#64748b;--wn:#fbbf24;--ng:#f87171;--ok:#4ade80;--mg:#c084fc}
html,body{height:100%;margin:0;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);-webkit-text-size-adjust:100%}
.mono{font-family:'Courier New',monospace}

/* Layout: left+right */
.wrap{display:flex;height:100%}
.left{width:420px;min-width:360px;height:100%;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:10px 12px 20px 12px;border-right:1px solid var(--bd);background:var(--card);flex-shrink:0}

/* Tablet: slightly narrower left */
body.tablet .left{width:380px;min-width:320px;padding:8px 10px 20px 10px}

h1{font-size:.95rem;font-weight:700;text-align:center;margin-bottom:1px}
.su{text-align:center;color:var(--dmr);font-size:.68rem;margin-bottom:4px}
.sec{border-top:1px solid var(--bd);padding-top:5px;margin-top:5px}
.st{font-size:.8rem;color:var(--ac2);font-weight:700;margin-bottom:2px}
.R{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.R label{font-size:.76rem;color:var(--dm);min-width:100px;flex-shrink:0}
body.tablet .R label{min-width:85px;font-size:.72rem}
.ni{width:68px;padding:2px 4px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.82rem;font-family:'Courier New',monospace;text-align:right}
.ni:focus{outline:none;border-color:var(--ac)}
.nis{width:55px;padding:2px 3px;border-radius:3px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.78rem;font-family:'Courier New',monospace;text-align:right}
.nis:focus{outline:none;border-color:var(--mg)}
.nit{width:52px;padding:2px 3px;border-radius:3px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.74rem}
.nit:focus{outline:none;border-color:var(--wn)}
.sel{padding:2px 2px;border-radius:3px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.74rem}
.U{font-size:.66rem;color:var(--dmr);white-space:nowrap}
.ht{font-size:.64rem;color:var(--dmr);margin-left:2px}
.sw{margin:1px 0 3px}
.sw input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:linear-gradient(90deg,#1e3a8a,#3b82f6);cursor:pointer;touch-action:none}
.sw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;border:2px solid var(--bg);background:var(--ac2)}
.wb{background:rgba(180,83,9,.15);border:1px solid rgba(180,83,9,.3);border-radius:3px;padding:2px 5px;margin:1px 0;font-size:.72rem;color:var(--wn);font-weight:600}
.btnrow{display:flex;gap:5px;margin:5px 0 2px}
.btn{padding:4px 6px;border-radius:4px;font-size:.7rem;font-weight:600;border:1px solid var(--bd);background:rgba(30,41,59,.6);color:var(--dm);cursor:pointer;flex:1;text-align:center}
.btn:hover{background:rgba(59,130,246,.15);color:var(--ac2);border-color:var(--ac)}
.btn.ld{color:var(--ok);border-color:rgba(74,222,128,.3)}
.slist{font-size:.76rem;color:var(--tx);margin-top:2px;max-height:none;overflow-y:visible}
.slist div{padding:4px 6px;cursor:pointer;border-radius:4px;display:flex;justify-content:space-between;align-items:center;background:rgba(30,41,59,.5);margin-bottom:2px;border:1px solid var(--bd)}
.slist div:hover{background:rgba(59,130,246,.15);border-color:var(--ac)}
.slist .del{cursor:pointer;padding:2px 5px;font-size:.8rem}.slist .ow{color:var(--wn)}.slist .rm{color:var(--ng)}
.mtfbox{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:4px;padding:4px 6px;margin-top:2px}
.mtfrow{display:flex;align-items:center;gap:2px;margin-bottom:1px;font-size:.74rem}
.mtfrow .ml{color:var(--dm);min-width:72px}
.mtfrow .mv{color:var(--mg);font-weight:700;font-family:'Courier New',monospace}
.mtfrow .mu{color:var(--dmr);font-size:.64rem}
.calcbox{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:4px;padding:4px 6px;margin-top:2px}
.calcR{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.calcR label{font-size:.74rem;color:var(--dm);min-width:60px}
.calcR .cv{color:var(--ac3);font-weight:600;font-family:'Courier New',monospace;font-size:.74rem}
.cbtn{padding:3px 8px;border-radius:4px;font-size:.72rem;font-weight:700;border:1px solid var(--mg);background:rgba(192,132,252,.12);color:var(--mg);cursor:pointer}
.cbtn:hover{background:rgba(192,132,252,.25)}
.cbtn2{padding:3px 8px;border-radius:4px;font-size:.72rem;font-weight:700;border:1px solid var(--ok);background:rgba(74,222,128,.1);color:var(--ok);cursor:pointer}
.cbtn2:hover{background:rgba(74,222,128,.2)}
.designbox{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:4px;padding:4px 6px;margin-top:2px}
.pjbox{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.25);border-radius:4px;padding:5px 7px;margin-top:2px}
.drow{display:flex;align-items:center;gap:2px;margin-bottom:1px;font-size:.74rem}
.drow label{color:var(--dm);min-width:85px}
.drow .dv{color:var(--ok);font-weight:600;font-family:'Courier New',monospace;font-size:.78rem}
.detEditBox{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:4px;padding:5px 7px;margin-top:2px}
.scaleBox{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.25);border-radius:4px;padding:5px 7px;margin-top:2px}
.scR{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.scR label{font-size:.72rem;color:var(--dm);min-width:62px}
.scR .nis{width:70px}
.detRow{display:flex;align-items:center;gap:3px;margin-bottom:2px;white-space:nowrap;flex-wrap:nowrap}
.detRow .dlbl{font-size:.76rem;color:var(--wn);font-weight:600;width:12px;flex-shrink:0}
.detRow input.nit{width:56px;flex-shrink:0}
.detRow input.nis{width:48px;flex-shrink:0}
.detRow select.sel{width:34px;flex-shrink:0}

/* Right panel: top/bottom 50% split */
.right{flex:1;height:100%;display:flex;flex-direction:column;padding:4px;overflow:hidden}
.topHalf{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--bd);padding-bottom:2px}
.btmHalf{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;padding-top:2px}
.diagRow{display:flex;gap:3px;flex:1;min-height:0;overflow:hidden}
.mainDiag{flex:1;min-width:0}
.subDiags{display:flex;flex-direction:column;gap:2px;width:140px;flex-shrink:0}
body.tablet .subDiags{width:120px}
.sideDiag,.fovDiag{flex:1;min-height:0}
.results{display:flex;flex-wrap:wrap;gap:2px 8px;padding:3px 0;font-size:.86rem;flex-shrink:0}
.rv{display:flex;gap:2px;align-items:baseline}
.rv .rl{color:var(--dm)}.rv .rval{color:var(--ac3);font-weight:600;font-family:'Courier New',monospace}
.rv .ru{color:var(--dmr);font-size:.72rem}
.rv.big .rval{color:var(--ac2);font-size:1.1rem;font-weight:700}
.rv.ng .rval{color:var(--ng)}.rv.wn .rval{color:var(--wn)}.rv.mtf .rval{color:var(--mg)}
.btmInner{display:flex;gap:4px;flex:1;min-height:0;overflow:hidden}
.btmCol{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.btmColRight{overflow-y:auto;-webkit-overflow-scrolling:touch}
.grCtrl{display:flex;gap:3px;align-items:center;padding:1px 0;flex-shrink:0}
.grCtrl label{font-size:.82rem;color:var(--dm)}
.grCtrl input{width:48px;padding:2px 4px;border-radius:3px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:.82rem;font-family:'Courier New',monospace;text-align:right}
#GR{flex:1;min-height:0}
.dtbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dtbl{width:100%;border-collapse:collapse;font-size:.8rem}
.dtbl th{text-align:right;color:var(--wn);padding:2px 4px;font-weight:600;border-bottom:1px solid rgba(251,191,36,.2);white-space:nowrap}
.dtbl th:first-child{text-align:left}
.dtbl td{text-align:right;padding:2px 4px;font-family:'Courier New',monospace;border-bottom:1px solid rgba(30,41,59,.4);white-space:nowrap}
.dtbl td:first-child{text-align:left;font-family:inherit;color:var(--wn);font-weight:600}
.left::-webkit-scrollbar,.right::-webkit-scrollbar{width:4px}
.left::-webkit-scrollbar-track,.right::-webkit-scrollbar-track{background:transparent}
.left::-webkit-scrollbar-thumb,.right::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.stbl{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:1px}
.stbl td{padding:2px 4px;border-bottom:1px solid rgba(30,41,59,.3)}
.stbl td:first-child{color:var(--dm);width:70px}
.stbl td:nth-child(2){color:var(--tx);font-family:'Courier New',monospace;font-weight:600}
.stbl td:nth-child(3){color:var(--dmr);font-size:.72rem}
.stbl2 td:nth-child(2){color:var(--mg);font-weight:700}
</style>
</head>
<body>
<div class="wrap">
<div class="left" id="PNL">
  <h1>CT シミュレーター</h1>
  <div class="su">汎用シングル系統</div>
  <div class="st">FDD / FOD</div>
  <div class="R"><label>FDD:</label><input type="number" class="ni" id="FDD" step="1" value="500"><span class="U">mm</span></div>
  <div class="sw"><input type="range" id="SL" min="30" max="1500" step="1" value="500"></div>
  <div class="R"><label>FOD:</label><input type="number" class="ni" id="FOD" step="0.1" value="28"><span class="U">mm</span><span class="ht" id="HT"></span></div>
  <div class="sw"><input type="range" id="SLF" min="1" max="200" step="0.5" value="28"></div>
  <div id="WN"></div>
  <div class="sec"><div class="st">線源パラメータ</div></div>
  <div class="R"><label>焦点–出射口:</label><input type="number" class="ni" id="FE" step="0.1" value="5"><span class="U">mm</span></div>
  <div class="R"><label>コリメータ厚:</label><input type="number" class="ni" id="CL" step="0.1" value="10"><span class="U">mm</span></div>
  <div class="R"><label>ギャップ:</label><input type="number" class="ni" id="GP" step="0.1" value="5"><span class="U">mm</span></div>
  <div class="R"><label>焦点径:</label><input type="number" class="ni" id="FS" step="0.1" value="5"><span class="U">μm</span></div>
  <div class="R"><label>X線源ファン角:</label><input type="number" class="ni" id="FAN" step="0.1" value="0"><span class="U">°(全角)</span></div>
  <div class="R"><label>受光ファン角:</label><span class="mono" style="color:var(--ac3);font-size:.82rem" id="RF"></span><span class="ht">(自動)</span></div>
  <div id="FA"></div>
  <div class="sec"><div class="st">検出器</div></div>
  <div class="R"><label>画素ピッチ:</label><input type="number" class="ni" id="PP" step="0.1" value="139"><span class="U">μm</span></div>
  <div class="R"><label>横 (pix):</label><input type="number" class="ni" id="PH" step="1" value="3072"><span class="U">pix</span></div>
  <div class="R"><label>縦 (pix):</label><input type="number" class="ni" id="PV" step="1" value="3060"><span class="U">pix</span></div>
  <div class="R"><label>ビニング:</label><select class="sel" id="BN"><option value="1">1×1</option><option value="2">2×2</option><option value="4">4×4</option></select></div>
  <div class="sec"><div class="st">ゴニオ（斜めCT）</div></div>
  <div class="R"><label>傾斜角:</label><input type="number" class="ni" id="GT" step="1" value="0"><span class="U">°</span></div>
  <div class="sec"><div class="st">サンプル</div></div>
  <div class="R"><label>直径 (φ):</label><input type="number" class="ni" id="SW" step="0.1" value="16"><span class="U">mm</span></div>
  <div class="R"><label>高さ (H):</label><input type="number" class="ni" id="SH" step="0.1" value="16"><span class="U">mm</span></div>
  <div class="sec"><div class="st">MTF / 焦点ボケ</div></div>
  <div class="mtfbox">
    <div id="MTF"></div>
    <div style="border-top:1px solid rgba(99,102,241,.15);margin:3px 0;padding-top:3px">
      <div class="calcR"><label style="min-width:75px">実効ボクセル:</label><input type="number" class="nis" id="MVOX" step="0.1" value="" placeholder="μm"><span class="U">μm</span>
        <button class="cbtn" style="padding:2px 6px;font-size:.7rem" id="BMTF">計算</button></div>
      <div class="calcR"><label style="min-width:75px">結果:</label><span class="cv" id="MOUT" style="font-size:.72rem">--</span></div>
    </div>
  </div>
  <div class="sec"><div class="st">最大径 ⇔ ボクセル</div></div>
  <div class="calcbox">
    <div class="calcR"><label>最大径:</label><input type="number" class="nis" id="CDIA" step="0.1" value="" placeholder="mm"><span class="U">mm</span></div>
    <div class="calcR"><label>ボクセル:</label><input type="number" class="nis" id="CRES" step="0.1" value="" placeholder="μm"><span class="U">μm</span></div>
    <div class="calcR" style="flex-wrap:wrap"><label>結果:</label><span class="cv" id="COUT">--</span></div>
    <button class="cbtn" id="BCALC">計算</button>
  </div>
  <div class="sec"><div class="st">自動最適設計</div></div>
  <div class="designbox">
    <div class="drow"><label>希望ボクセル:</label><input type="number" class="nis" id="DRES" step="0.1" value="" placeholder="μm"><span class="U">μm</span></div>
    <div class="drow"><label>最大サンプル径:</label><input type="number" class="nis" id="DDIA" step="0.1" value="" placeholder="mm"><span class="U">mm</span></div>
    <button class="cbtn2" id="BDESIGN">最適設計</button>
    <div id="DOUT" style="margin-top:2px;font-size:.74rem"></div>
  </div>
  <div class="sec"><div class="st">プロジェクション数 算出</div></div>
  <div class="pjbox">
    <div class="drow"><label>拡大倍率:</label><input type="number" class="nis" id="PJMAG" step="0.1" value="" placeholder="倍"><span class="U">倍</span>
      <button class="cbtn" style="padding:2px 6px;font-size:.68rem;margin-left:3px" id="PJCUR">現在値</button></div>
    <div class="drow"><label>Crowther係数:</label><input type="number" class="nis" id="PJCW" step="1" value="100" style="width:44px"><span class="U">%</span>
      <span class="ht">(100%=理論値)</span></div>
    <button class="cbtn2" id="BPJCALC" style="margin-top:2px">Pj数 算出</button>
    <div id="PJOUT" style="margin-top:3px;font-size:.74rem"></div>
  </div>
  <div class="sec"><div class="st">スケール調整</div></div>
  <div class="scaleBox">
    <div style="font-size:.68rem;color:var(--dmr);margin-bottom:3px">検出器pp: 現在の設定値を使用</div>
    <div style="font-size:.72rem;color:var(--ac2);font-weight:600;margin:3px 0 2px">球①（小）</div>
    <div class="scR"><label>実寸径:</label><input type="number" class="nis" id="S1D" step="1" value="2000" placeholder="μm"><span class="U">μm</span></div>
    <div class="scR"><label>X位置:</label><input type="number" class="nis" id="S1X" step="0.1" value="" placeholder="mm"><span class="U">mm</span></div>
    <div class="scR"><label>解像度:</label><input type="number" class="nis" id="S1R" step="0.001" value="" placeholder="μm/px"><span class="U">μm/px</span></div>
    <div class="scR"><label>球の体積:</label><input type="number" class="nis" id="S1V" step="0.001" value="" placeholder="mm³"><span class="U">mm³</span></div>
    <div style="font-size:.72rem;color:var(--ac2);font-weight:600;margin:3px 0 2px">球②（大）</div>
    <div class="scR"><label>実寸径:</label><input type="number" class="nis" id="S2D" step="1" value="15000" placeholder="μm"><span class="U">μm</span></div>
    <div class="scR"><label>X位置:</label><input type="number" class="nis" id="S2X" step="0.1" value="" placeholder="mm"><span class="U">mm</span></div>
    <div class="scR"><label>解像度:</label><input type="number" class="nis" id="S2R" step="0.001" value="" placeholder="μm/px"><span class="U">μm/px</span></div>
    <div class="scR"><label>球の体積:</label><input type="number" class="nis" id="S2V" step="0.001" value="" placeholder="mm³"><span class="U">mm³</span></div>
    <div style="font-size:.72rem;color:var(--wn);font-weight:600;margin:3px 0 2px">確認用球③</div>
    <div class="scR"><label>実寸径:</label><input type="number" class="nis" id="S3D" step="1" value="5000" placeholder="μm"><span class="U">μm</span></div>
    <div class="scR"><label>解像度:</label><input type="number" class="nis" id="S3R" step="0.001" value="" placeholder="μm/px"><span class="U">μm/px</span></div>
    <div class="scR"><label>球の体積:</label><input type="number" class="nis" id="S3V" step="0.001" value="" placeholder="mm³"><span class="U">mm³</span></div>
    <button class="cbtn2" id="BSCALE" style="margin-top:3px">スケール算出</button>
  </div>
  <div class="sec"><div class="st">検出器比較 (5台)</div></div>
  <div class="detEditBox" id="DETEDIT"></div>
  <div class="sec"><div class="st">保存</div></div>
  <div class="btnrow">
    <button class="btn" id="BSAVE">💾 保存</button>
    <button class="btn ld" id="BLOAD">📂 読込</button>
  </div>
  <div class="slist" id="SV"></div>
  <div style="height:16px"></div>
</div>
<div class="right" id="DIA">
  <div class="topHalf">
    <div class="diagRow">
      <div class="mainDiag" id="DG"></div>
      <div class="subDiags">
        <div class="sideDiag" id="SD"></div>
        <div class="fovDiag" id="FV"></div>
      </div>
    </div>
    <div class="results" id="RS"></div>
  </div>
  <div class="btmHalf">
    <div class="btmInner">
      <div class="btmCol">
        <div class="grCtrl">
          <label>倍率:</label><input type="number" id="GMIN" value="1" step="1">
          <label>〜</label><input type="number" id="GMAX" value="50" step="1">
          <label>Y:</label><input type="number" id="GYMAX" value="200" step="10"><label>μm</label>
        </div>
        <div id="GR"></div>
      </div>
      <div class="btmCol btmColRight">
        <div id="DETCMP"></div>
        <div id="SCALEOUT"></div>
      </div>
    </div>
  </div>
</div>
</div>
<script>
(function(){
"use strict";
var isTablet=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
if(isTablet)document.body.classList.add('tablet');

var IDS=["FDD","FOD","FE","CL","GP","FS","FAN","PP","PH","PV","GT","SW","SH"];
var $=function(id){return document.getElementById(id)};
function gv(id){var v=parseFloat($(id).value);return isNaN(v)?0:v}
function gi(id){var v=parseInt($(id).value);return isNaN(v)?1:v}
function fm(v,d){d=d==null?2:d;return Math.abs(v)<0.001?"0":v.toFixed(d)}
function ns(t,a){var e=document.createElementNS("http://www.w3.org/2000/svg",t);if(a)for(var k in a)e.setAttribute(k,String(a[k]));return e}
function tx(x,y,s,a){var t=ns("text",Object.assign({x:x,y:y},a||{}));t.textContent=s;return t}

function rdP(){
  var bn=gi("BN")||1,ppRaw=gv("PP"),pxH=gv("PH"),pxV=gv("PV");
  return{fdd:gv("FDD"),fod:gv("FOD"),fe:gv("FE"),cl:gv("CL"),gp:gv("GP"),fs:gv("FS"),fan:gv("FAN"),
    ppRaw:ppRaw,pp:ppRaw*bn,pH:Math.floor(pxH/bn),pV:Math.floor(pxV/bn),pxH:pxH,pxV:pxV,bn:bn,gt:gv("GT"),sw:gv("SW"),sh:gv("SH")}
}
function fodMin(p){return p.fe+p.cl+p.gp}
function calc(p){
  var fod=Math.max(p.fod,0.01),fdd=Math.max(p.fdd,1),mag=fdd/fod,res=p.pp/mag;
  var dW=p.pH*p.pp/1000,dH=p.pV*p.pp/1000,fovH=dW/mag,fovV=dH/mag;
  var recvFan=2*Math.atan(dW/2/fdd)*180/Math.PI,srcFan=p.fan;
  var halfRad=(srcFan>0?srcFan:recvFan)/2*Math.PI/180;
  var recvOverSrc=srcFan>0&&recvFan>srcFan;
  var tilt=p.gt||0,rad=tilt*Math.PI/180;

/* Calc tools */
$("BCALC").addEventListener("click",function(){
  var diaIn=parseFloat($("CDIA").value),voxIn=parseFloat($("CRES").value),p=rdP(),fdd=Math.max(p.fdd,1),pp=p.pp,dW=p.pH*pp/1000;
  var hD=!isNaN(diaIn)&&diaIn>0,hV=!isNaN(voxIn)&&voxIn>0;
  if(hD&&!hV){var M=dW/diaIn;if(M<1.001)M=1.001;var fod=fdd/M,v=pp/M,fb=p.fs*(M-1),mtf=Math.sqrt(fb*fb+v*v);
    $("COUT").textContent="φ"+fm(diaIn,1)+"→×"+fm(M,1)+" FOD"+fm(fod,1)+" vox"+fm(v,1)+"μm MTF"+fm(mtf,1)+"μm"}
  else if(hV&&!hD){var M2=pp/voxIn;if(M2<1.001)M2=1.001;var f2=fdd/M2,md=dW/M2,fb2=p.fs*(M2-1),mtf2=Math.sqrt(fb2*fb2+voxIn*voxIn);
    $("COUT").textContent=fm(voxIn,1)+"μm→×"+fm(M2,1)+" FOD"+fm(f2,1)+" 最大φ"+fm(md,1)+"mm MTF"+fm(mtf2,1)+"μm"}
  else $("COUT").textContent=hD&&hV?"一方だけ入力":"最大径orボクセルを入力";
});
$("BMTF").addEventListener("click",function(){
  var vox=parseFloat($("MVOX").value);if(isNaN(vox)||vox<=0){$("MOUT").textContent="ボクセルを入力";return}
  var p=rdP(),pp=p.pp,fs=p.fs,fdd=Math.max(p.fdd,1),M=pp/vox;if(M<1.001)M=1.001;
  var fod=fdd/M,fb=fs*(M-1),mtf=Math.sqrt(fb*fb+vox*vox),dW=p.pH*pp/1000;
  $("MOUT").textContent=fm(vox,1)+"μm→×"+fm(M,1)+" FOD"+fm(fod,1)+" MTF"+fm(mtf,1)+"μm 最大φ"+fm(dW/M,1)+"mm";
});
$("BDESIGN").addEventListener("click",function(){
  var tR=parseFloat($("DRES").value),mD=parseFloat($("DDIA").value);
  if(isNaN(tR)||tR<=0||isNaN(mD)||mD<=0){$("DOUT").innerHTML='<span style="color:#f87171">両方入力</span>';return}
  var p=rdP(),pp=p.pp,fdd=Math.max(p.fdd,1),dW=p.pH*pp/1000;
  var Mf=dW/mD,Mv=pp/tR;if(Mf<1.001)Mf=1.001;if(Mv<1.001)Mv=1.001;
  var Mq=Math.max(Mf,Mv),fq=fdd/Mq,vA=pp/Mq,db=pp/Mq;
  var r2=tR*tR-db*db,mF=0;if(r2>0&&(Mq-1)>.001)mF=Math.sqrt(r2)/(Mq-1);
  var fb=p.fs*(Mq-1),mtfA=Math.sqrt(fb*fb+db*db),fovA=dW/Mq;
  var h='<div style="border:1px solid rgba(74,222,128,.2);border-radius:3px;padding:3px;background:rgba(74,222,128,.04);font-size:.74rem">';
  h+='<div class="drow"><label>必要倍率:</label><span class="dv">×'+fm(Mq,2)+'</span></div>';
  h+='<div class="drow"><label>FOD:</label><span class="dv">'+fm(fq,2)+'mm</span></div>';
  h+='<div class="drow"><label>ボクセル:</label><span class="dv">'+fm(vA,2)+'μm</span></div>';
  h+='<div class="drow"><label>FOV:</label><span class="dv">'+fm(fovA,1)+'mm</span>'+(fovA<mD?'<span style="color:#f87171;margin-left:3px">⚠不足</span>':'')+'</div>';
  h+='<div class="drow"><label>現MTF:</label><span class="dv" style="color:'+(mtfA<=tR?'#4ade80':'#f87171')+'">'+fm(mtfA,1)+'μm '+(mtfA<=tR?'✔':'✘')+'</span></div>';
  if(mF>0)h+='<div class="drow"><label>必要焦点径:</label><span class="dv">≤'+fm(mF,1)+'μm</span></div>';
  h+='</div>';$("DOUT").innerHTML=h;
});

/* ========== PROJECTION NUMBER CALC ========== */
$("PJCUR").addEventListener("click",function(){
  var p=rdP(),c=calc(p);$("PJMAG").value=fm(c.mag,1);
});
$("BPJCALC").addEventListener("click",function(){
  var M=parseFloat($("PJMAG").value);
  var cwPct=parseFloat($("PJCW").value);
  if(isNaN(M)||M<1.001){$("PJOUT").innerHTML='<span style="color:#f87171">倍率を入力</span>';return}
  if(isNaN(cwPct)||cwPct<=0)cwPct=100;
  var p=rdP(),pp=p.pp,fdd=Math.max(p.fdd,1);
  var dia=p.sw; /* サンプル径(mm) from upper panel */
  if(dia<=0){$("PJOUT").innerHTML='<span style="color:#f87171">サンプル径を入力</span>';return}
  var r=dia/2; /* 半径(mm) */
  var vox=pp/M; /* 実効ボクセル(μm) */
  var voxMM=vox/1000; /* mm */
  var fod=fdd/M;
  var dW=p.pH*pp/1000; /* 検出器幅(mm) */
  var fovH=dW/M; /* 視野(mm) */
  var ppMM=pp/1000; /* 検出器pp(mm) */

  /* ---- 1pixel条件: 最外殻が投影面上で1Pjあたり1pixel以内 ---- */
  /* 投影面でのサンプル半径 = r×M */
  /* 1Pjの弧長 = 2π×r×M / N ≤ pp(mm) */
  /* → N = 2π×r×M / pp = π×D×M / pp */
  var N1px=2*Math.PI*r*M/ppMM;

  /* ---- Crowther式: N_cw = N1px × (cwPct/100) ---- */
  var Ncw=N1px*(cwPct/100);

  /* ---- 撮影時間目安(fps=5,avg=1想定) ---- */
  var fps=5;

  var h='<div style="border:1px solid rgba(56,189,248,.2);border-radius:3px;padding:4px;background:rgba(56,189,248,.04);font-size:.74rem">';
  h+='<div style="color:#94a3b8;font-size:.68rem;margin-bottom:2px">φ'+fm(dia,1)+'mm(r='+fm(r,1)+') / ×'+fm(M,1)+' / vox'+fm(vox,1)+'μm / FOV'+fm(fovH,1)+'mm</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:.74rem">';
  h+='<tr style="border-bottom:1px solid rgba(56,189,248,.2)"><th style="text-align:left;color:#38bdf8;font-weight:600;padding:1px 3px">方式</th><th style="text-align:right;color:#38bdf8;padding:1px 3px">Pj数</th><th style="text-align:right;color:#38bdf8;padding:1px 3px">角度/Pj</th><th style="text-align:right;color:#38bdf8;padding:1px 3px">時間</th></tr>';
  function row(label,N,color){
    var ang=360/N,t=N/fps;
    var tStr=t<60?fm(t,0)+'秒':fm(t/60,1)+'分';
    h+='<tr><td style="color:'+color+';padding:1px 3px;font-weight:600">'+label+'</td>';
    h+='<td style="text-align:right;color:#e2e8f0;font-family:Courier New,monospace;padding:1px 3px">'+Math.ceil(N)+'</td>';
    h+='<td style="text-align:right;color:#94a3b8;font-family:Courier New,monospace;padding:1px 3px">'+fm(ang,3)+'°</td>';
    h+='<td style="text-align:right;color:#64748b;font-family:Courier New,monospace;padding:1px 3px">'+tStr+'</td></tr>';
  }
  row('1pixel条件 (2πrM/pp)',N1px,'#4ade80');
  row('Crowther ('+fm(cwPct,0)+'%)',Ncw,'#38bdf8');
  h+='</table>';
  h+='<div style="margin-top:3px;padding-top:2px;border-top:1px solid rgba(56,189,248,.12);font-size:.68rem;color:#64748b">';
  h+='1pixel: N=2πrM/pp (r='+fm(r,1)+'mm, M='+fm(M,1)+', pp='+fm(pp,0)+'μm)';
  h+='<br>Crowther: 1pixel×'+fm(cwPct,0)+'%';
  h+='<br>※時間はfps='+fps+',avg=1,加算=1の概算';
  h+='</div></div>';
  $("PJOUT").innerHTML=h;
});

/* ========== SCALE ADJUSTMENT ========== */
$("BSCALE").addEventListener("click",function(){
  var p=rdP();
  var detPP=p.ppRaw; /* 検出器の生pp(μm) - ビニング前 */
  var bn=p.bn;
  var effPP=detPP*bn; /* ビニング込み実効pp */

  /* 球① (小) */
  var s1d=parseFloat($("S1D").value); /* 実寸径(μm) */
  var s1x=parseFloat($("S1X").value); /* X位置(mm) */
  var s1r=parseFloat($("S1R").value); /* 解像度(μm/px) */
  var s1v=parseFloat($("S1V").value); /* 体積(mm³) */

  /* 球② (大) */
  var s2d=parseFloat($("S2D").value);
  var s2x=parseFloat($("S2X").value);
  var s2r=parseFloat($("S2R").value);
  var s2v=parseFloat($("S2V").value);

  /* 確認用球③ */
  var s3d=parseFloat($("S3D").value);
  var s3r=parseFloat($("S3R").value);
  var s3v=parseFloat($("S3V").value);

  var PI=Math.PI;
  var h='<div style="font-size:.82rem;color:var(--ac2);font-weight:700;margin-bottom:3px">スケール調整結果</div>';
  h+='<div style="font-size:.74rem;color:var(--dmr);margin-bottom:2px">検出器pp='+fm(effPP,0)+'μm'+(bn>1?' ('+bn+'×bin)':'')+'</div>';

  /* Check inputs for offset/range calc */
  var canCalc=!isNaN(s1d)&&s1d>0&&!isNaN(s1x)&&!isNaN(s1r)&&s1r>0&&!isNaN(s1v)&&s1v>0
    &&!isNaN(s2d)&&s2d>0&&!isNaN(s2x)&&!isNaN(s2r)&&s2r>0&&!isNaN(s2v)&&s2v>0;

  if(canCalc){
    /* 測定径(mm) from volume: 2r = 2*((3V)/(4π))^(1/3) */
    var d1=2*Math.pow(3*s1v/(4*PI),1/3);
    var d2=2*Math.pow(3*s2v/(4*PI),1/3);

    /* 直径pixel長: dia(mm) / resolution(μm/px) * 1000 */
    var n1=d1/s1r*1000;
    var n2=d2/s2r*1000;

    /* Offset = (S_true * L_x * N_L - L_true * S_x * N_S) / (L_true * N_S - S_true * N_L) */
    var denom=s2d*n1-s1d*n2;
    if(Math.abs(denom)<1e-10){
      h+='<div style="color:var(--ng);font-weight:600">⚠ 計算不能（分母≈0）</div>';
    }else{
      var offset=(s1d*s2x*n2-s2d*s1x*n1)/denom;
      /* Range = det_pp * N_S * (S_x + Offset) / S_true */
      var range=effPP*n1*(s1x+offset)/s1d;

      /* 誤差(μm) */
      var err1=Math.abs(d1*1000-s1d);
      var err2=Math.abs(d2*1000-s2d);

      h+='<div style="font-size:.8rem;font-weight:600;color:#60a5fa;margin:2px 0">球①（φ'+fm(s1d/1000,1)+'mm）</div>';
      h+='<table class="stbl"><tr><td>測定径</td><td>'+fm(d1,4)+' mm</td></tr>';
      h+='<tr><td>pixel長</td><td>'+fm(n1,1)+' px</td></tr>';
      h+='<tr><td>誤差</td><td style="color:'+(err1<s1r?'#4ade80':'#f87171')+'">'+fm(err1,3)+' μm</td></tr></table>';

      h+='<div style="font-size:.8rem;font-weight:600;color:#60a5fa;margin:2px 0">球②（φ'+fm(s2d/1000,1)+'mm）</div>';
      h+='<table class="stbl"><tr><td>測定径</td><td>'+fm(d2,4)+' mm</td></tr>';
      h+='<tr><td>pixel長</td><td>'+fm(n2,1)+' px</td></tr>';
      h+='<tr><td>誤差</td><td style="color:'+(err2<s2r?'#4ade80':'#f87171')+'">'+fm(err2,3)+' μm</td></tr></table>';

      h+='<div style="border-top:1px solid rgba(168,85,247,.3);margin:4px 0;padding-top:3px">';
      h+='<table class="stbl stbl2"><tr><td>Offset</td><td style="font-size:.95rem">'+fm(offset,4)+'</td><td>mm</td></tr>';
      h+='<tr><td>Range</td><td style="font-size:.95rem">'+fm(range,3)+'</td><td>mm</td></tr>';
      h+='</table></div>';
    }
  }else{
    h+='<div style="color:var(--dmr);font-size:.78rem">球①②のデータを入力→算出</div>';
  }

  /* 確認用球③ */
  var canCheck=!isNaN(s3d)&&s3d>0&&!isNaN(s3r)&&s3r>0&&!isNaN(s3v)&&s3v>0;
  if(canCheck){
    var d3=2*Math.pow(3*s3v/(4*PI),1/3);
    var err3=Math.abs(d3*1000-s3d);
    var tol=s3r; /* 許容誤差=解像度 */
    var pass=err3<=tol;

    h+='<div style="border-top:1px solid rgba(251,191,36,.3);margin:4px 0;padding-top:3px">';
    h+='<div style="font-size:.8rem;font-weight:600;color:var(--wn);margin-bottom:2px">確認用球③（φ'+fm(s3d/1000,1)+'mm）</div>';
    h+='<table class="stbl"><tr><td>測定径</td><td>'+fm(d3,4)+' mm</td></tr>';
    h+='<tr><td>誤差</td><td>'+fm(err3,3)+' μm</td></tr>';
    h+='<tr><td>許容(=解像度)</td><td>'+fm(tol,3)+' μm</td></tr></table>';
    h+='<div style="text-align:center;margin-top:4px;padding:4px;border-radius:4px;font-size:.9rem;font-weight:700;'
      +(pass?'background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)':'background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)')
      +'">'+(pass?'✔ PASS':'✘ FAIL')+'</div>';
    h+='</div>';
  }

  $("SCALEOUT").innerHTML=h;
});

/* SAVE/LOAD */
function getSaves(){try{return JSON.parse(localStorage.getItem("ct_saves")||"[]")}catch(e){return[]}}
function putSaves(a){localStorage.setItem("ct_saves",JSON.stringify(a))}
function renderSaves(){var s=getSaves(),el=$("SV");
  if(!s.length){el.innerHTML='<div style="padding:2px;color:#475569">保存なし</div>';return}
  el.innerHTML=s.map(function(v,i){return '<div><span style="flex:1" data-act="load" data-i="'+i+'">'+v.name+'</span><span class="del ow" data-act="ow" data-i="'+i+'">↑</span><span class="del rm" data-act="rm" data-i="'+i+'">✕</span></div>'}).join("")}
$("SV").addEventListener("click",function(e){var t=e.target,act=t.getAttribute("data-act"),i=parseInt(t.getAttribute("data-i"));
  if(!act||isNaN(i))return;var saves=getSaves();if(!saves[i])return;
  if(act==="load"){var d=saves[i].data;IDS.forEach(function(id){if(d[id]!=null)$(id).value=d[id]});if(d.BN)$("BN").value=d.BN;update()}
  else if(act==="ow"){if(!confirm("上書き？"))return;var data={};IDS.forEach(function(id){data[id]=gv(id)});data.BN=gi("BN");saves[i].data=data;putSaves(saves);renderSaves()}
  else if(act==="rm"){if(!confirm("削除？"))return;saves.splice(i,1);putSaves(saves);renderSaves()}});
$("BSAVE").addEventListener("click",function(){var saves=getSaves(),name=prompt("設定名:","設定"+(saves.length+1));if(!name)return;
  var data={};IDS.forEach(function(id){data[id]=gv(id)});data.BN=gi("BN");
  for(var i=0;i<saves.length;i++){if(saves[i].name===name){if(!confirm("上書き？"))return;saves[i].data=data;putSaves(saves);renderSaves();return}}
  saves.push({name:name,data:data});putSaves(saves);renderSaves()});
$("BLOAD").addEventListener("click",function(){if(!getSaves().length){alert("保存なし");return}renderSaves()});

/* MAIN UPDATE */
function update(){var p=rdP();doWarn(p);var c=calc(p);
  $("SL").value=p.fdd;$("SLF").value=p.fod;$("RF").textContent=fm(c.recvFan,1)+"°";
  $("FA").innerHTML=c.recvOverSrc?'<div class="wb">⚠受光>線源</div>':"";
  $("DG").innerHTML="";$("DG").appendChild(drawTop(p,c));
  $("SD").innerHTML="";$("SD").appendChild(drawSide(p,c));
  $("FV").innerHTML="";$("FV").appendChild(drawFront(c,p));
  mkResults(c,p);mkMTF(c,p);
  var gr=$("GR");gr.innerHTML="";gr.appendChild(drawGraph(p,gr));
  mkDetCompare(p);
}

/* EVENTS */
$("SL").addEventListener("input",function(){$("FDD").value=this.value;update()});
$("SLF").addEventListener("input",function(){$("FOD").value=this.value;update()});
$("BN").addEventListener("change",function(){update()});
["FE","CL","GP"].forEach(function(id){$(id).addEventListener("input",function(){var p=rdP(),mn=fodMin(p),c=calc(p);if(p.fod<mn+c.projW/2)$("FOD").value=fm(mn+c.projW/2);update()})});
IDS.forEach(function(id){$(id).addEventListener("input",function(){update()})});
["GMIN","GMAX","GYMAX"].forEach(function(id){$(id).addEventListener("input",function(){var gr=$("GR");gr.innerHTML="";gr.appendChild(drawGraph(rdP(),gr))})});
window.addEventListener("resize",function(){clearTimeout(window._rto);window._rto=setTimeout(update,200)});

buildDetEdit();$("FOD").value=fm(5+10+5+16/2);renderSaves();update();setTimeout(update,300);
})();
</script>
